<!DOCTYPE html>
<!--
  프롬어스 Knowledge Hub — 자동 생성 파일 (build_hub.py 로 빌드)
  데이터는 아래 kb-data 스크립트의 마커 사이에 주입됩니다. 직접 편집하지 마세요.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>프롬어스 Knowledge Hub</title>
<script>
  // 테마 조기 적용 (페인트 전 — 깜빡임 방지)
  (function(){try{var t=localStorage.getItem('fu-theme');
    if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
    document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#181410">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Noto+Serif+KR:wght@600;700;900&family=Playfair+Display:ital,wght@0,700;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   From Us Knowledge Hub — 'Ink & Gold' Design System v5
   에디토리얼(경제지) × 데이터 대시보드 · 사이드바 레이아웃
   ═══════════════════════════════════════════════════════════ */
:root{
  color-scheme: light dark;
  --bg:#f3efe7; --white:#fffdf8; --surface:#fffdf8; --surface-2:#f7f3ea; --surface-3:#eee8da;
  --border:#e2dac8; --border-light:#ece6d7;
  --gold:#9a7508; --gold-2:#c49a1a; --gold-bg:#f9f2dd; --gold-border:#e8d9a8;
  --blue:#2f5fd0; --blue-bg:#edf2fc; --red:#c2402f; --red-bg:#fdf0ed;
  --green:#247a3d; --green-bg:#eef8f0; --purple:#6d4fc4; --purple-bg:#f3f0fc;
  --cyan:#0d7e96; --cyan-bg:#eaf7fa;
  --text:#191510; --text-2:#46413a; --text-3:#857d6f; --text-4:#aaa191;
  --topbar-bg:rgba(243,239,231,.86); --shadow:rgba(45,33,10,.05); --grid:#ece6d7;
  --side-bg:#181410; --side-bg2:#221c14; --side-line:#332b1f;
  --side-text:#cfc6b5; --side-dim:#8b8170; --side-gold:#d9ab3c;
  --r-lg:18px; --r-md:14px; --r-sm:10px;
}
:root[data-theme="dark"]{
  color-scheme: dark;
  --bg:#0e0c09; --white:#171410; --surface:#171410; --surface-2:#1f1b14; --surface-3:#292318;
  --border:#332c1f; --border-light:#262017;
  --gold:#d9ab3c; --gold-2:#e8c465; --gold-bg:#2a2110; --gold-border:#4a3b16;
  --blue:#7ea4f0; --blue-bg:#16203a; --red:#ef8d7d; --red-bg:#371d18;
  --green:#6fcf8c; --green-bg:#14281a; --purple:#b39df0; --purple-bg:#221a3a;
  --cyan:#5fd0e8; --cyan-bg:#11303a;
  --text:#f0ebe0; --text-2:#c6bfb0; --text-3:#968d7c; --text-4:#6c6557;
  --topbar-bg:rgba(14,12,9,.86); --shadow:rgba(0,0,0,.4); --grid:#262017;
  --side-bg:#0a0907; --side-bg2:#14110c; --side-line:#262017;
  --side-text:#c6bfb0; --side-dim:#6c6557; --side-gold:#d9ab3c;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-size:14px;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
.mono{font-family:'JetBrains Mono',monospace;}
.serif{font-family:'Playfair Display','Noto Serif KR',serif;}
a{color:inherit;}
button{font-family:inherit;}
button:focus-visible,input:focus-visible,a:focus-visible,.chip:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px;}

/* ── APP LAYOUT ───────────────────────────────────────────── */
.app{display:flex;min-height:100vh;}
.side{position:fixed;top:0;left:0;bottom:0;width:236px;z-index:80;display:flex;flex-direction:column;
  background:linear-gradient(180deg,var(--side-bg) 0%,var(--side-bg2) 100%);border-right:1px solid var(--side-line);}
.side-brand{padding:26px 22px 20px;border-bottom:1px solid var(--side-line);}
.side-brand .logo{display:block;font-family:'Playfair Display','Noto Serif KR',serif;font-size:26px;font-weight:700;color:var(--side-gold);line-height:1.2;letter-spacing:.5px;}
.side-sub{display:block;margin-top:5px;font-size:9.5px;letter-spacing:4px;text-transform:uppercase;color:var(--side-dim);font-family:'JetBrains Mono',monospace;}
.side-nav{flex:1;overflow-y:auto;padding:14px 12px;scrollbar-width:none;}
.side-nav::-webkit-scrollbar{display:none;}
.tabs{display:flex;flex-direction:column;gap:2px;}
.tab{display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;border:0;background:transparent;
  color:var(--side-text);font-size:13.5px;font-weight:500;text-align:left;border-radius:10px;cursor:pointer;
  position:relative;transition:background .15s,color .15s;}
.tab .t-ico{width:20px;text-align:center;font-size:15px;opacity:.85;flex-shrink:0;}
.tab:hover{background:rgba(255,255,255,.05);color:#fff;}
.tab.active{background:rgba(217,171,60,.13);color:var(--side-gold);font-weight:700;}
.tab.active::before{content:'';position:absolute;left:-12px;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--side-gold);}
.side-foot{padding:16px 20px 20px;border-top:1px solid var(--side-line);display:flex;flex-direction:column;gap:10px;}
.theme-btn{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid var(--side-line);color:var(--side-text);
  width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:15px;line-height:1;transition:.15s;}
.theme-btn:hover{border-color:var(--side-gold);color:var(--side-gold);}
.side-foot .meta{font-size:10px;line-height:1.6;color:var(--side-dim);font-family:'JetBrains Mono',monospace;word-break:keep-all;}
.main{flex:1;min-width:0;margin-left:236px;display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR / SEARCH ──────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:60;background:var(--topbar-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.topbar-inner{max-width:1180px;margin:0 auto;padding:12px 28px;display:flex;align-items:center;gap:14px;}
.m-logo{display:none;font-size:19px;font-weight:700;color:var(--gold);white-space:nowrap;}
.searchwrap{position:relative;flex:1;min-width:0;}
.searchbox{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);
  border-radius:13px;padding:9px 14px;transition:border .15s,box-shadow .15s;}
.searchbox:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg);}
.searchbox input{flex:1;border:0;outline:0;background:transparent;color:var(--text);font-size:14px;font-family:inherit;min-width:0;}
.searchbox input::placeholder{color:var(--text-4);}
.searchbox .ico{font-size:13px;opacity:.6;flex-shrink:0;}
.searchbox .clr{border:0;background:transparent;color:var(--text-4);cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0;}
.searchbox::after{content:'/ 또는 ⌘K';font-size:10px;color:var(--text-4);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.search-hint{font-size:11px;color:var(--text-3);padding:4px 4px 0;}
.search-panel{display:none;position:absolute;left:0;right:0;top:100%;margin-top:10px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:0 18px 60px rgba(20,14,4,.18);
  max-height:70vh;overflow:auto;z-index:70;padding:10px;}
:root[data-theme="dark"] .search-panel{box-shadow:0 18px 60px rgba(0,0,0,.6);}
.search-panel.open{display:block;}
.sp-head{display:flex;gap:6px;flex-wrap:wrap;padding:4px 6px 10px;border-bottom:1px solid var(--border-light);margin-bottom:6px;}
.sp-filter{border:1px solid var(--border);background:var(--surface-2);color:var(--text-3);font-size:11.5px;
  padding:3px 11px;border-radius:999px;cursor:pointer;transition:.15s;}
.sp-filter.on{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;}
.sr{padding:10px 12px;border-radius:12px;cursor:pointer;}
.sr:hover{background:var(--surface-2);}
.sr-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.sr-kind{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);background:var(--gold-bg);
  border:1px solid var(--gold-border);border-radius:6px;padding:1px 7px;flex-shrink:0;}
.sr-title{font-weight:600;font-size:13.5px;}
.sr-date{margin-left:auto;font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;}
.sr-snip{font-size:12px;color:var(--text-3);line-height:1.6;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sr-empty{padding:26px;text-align:center;color:var(--text-4);font-size:13px;}
mark{background:var(--gold-bg);color:var(--gold);border-radius:3px;padding:0 2px;font-weight:600;}

/* ── PAGE / VIEWS ─────────────────────────────────────────── */
.page{max-width:1180px;margin:0 auto;padding:28px;width:100%;flex:1;}
.view{display:none;}
.view.active{display:block;animation:fade .28s ease;}
/* 수출입동향 임베드 */
#view-trade .tradeframe{width:100%;height:calc(100vh - 150px);min-height:640px;border:0;border-radius:14px;background:transparent;display:block;}
@media (max-width:880px){#view-trade .tradeframe{height:calc(100vh - 210px);min-height:520px;border-radius:10px;}}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.sec-title{font-family:'Playfair Display','Noto Serif KR',serif;font-size:21px;font-weight:700;margin:34px 0 6px;letter-spacing:-.2px;}
.sec-title:first-child{margin-top:0;}
.sec-sub{font-size:12.5px;color:var(--text-3);margin-bottom:16px;}
.count-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;color:var(--gold);
  background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:999px;padding:0 8px;vertical-align:2px;}
.card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:24px;margin-bottom:18px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:760px){.grid2{grid-template-columns:1fr;}}
.empty{padding:30px;text-align:center;color:var(--text-4);font-size:13px;}

/* ── HOME: 브리핑 히어로 ──────────────────────────────────── */
.briefing{position:relative;overflow:hidden;border-radius:22px;margin-bottom:20px;
  background:linear-gradient(140deg,#1d1812 0%,#2b2316 60%,#241d12 100%);color:#efe9dc;
  border:1px solid #3a3020;}
.briefing::before{content:'';position:absolute;inset:0 0 auto 0;height:3px;
  background:linear-gradient(90deg,transparent,#d9ab3c 30%,#e8c465 50%,#d9ab3c 70%,transparent);}
.brf-in{padding:34px 36px 30px;}
.brf-tag{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:#d9ab3c;font-family:'JetBrains Mono',monospace;}
.brf-tag .live{width:7px;height:7px;border-radius:50%;background:#e8c465;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,196,101,.5);}50%{box-shadow:0 0 0 6px rgba(232,196,101,0);}}
.brf-date{color:#8b8170;letter-spacing:1px;font-weight:500;}
.brf-h{font-family:'Playfair Display','Noto Serif KR',serif;font-size:clamp(23px,3.4vw,33px);font-weight:900;
  line-height:1.32;margin:12px 0 8px;color:#f7f2e6;letter-spacing:-.3px;}
.brf-sub{font-size:14px;color:#b8ae9b;line-height:1.75;max-width:760px;}
.brf-quote{margin:18px 0 0;padding:14px 18px;border-left:3px solid #d9ab3c;background:rgba(217,171,60,.07);
  border-radius:0 12px 12px 0;font-size:13.5px;line-height:1.8;color:#ddd5c4;font-style:italic;}
.brf-quote cite{display:block;margin-top:6px;font-style:normal;font-size:11px;color:#8b8170;font-family:'JetBrains Mono',monospace;}
.brf-points{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:18px;}
@media(max-width:680px){.brf-points{grid-template-columns:1fr;}.brf-in{padding:26px 22px 24px;}}
.brf-pt{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;line-height:1.65;color:#cfc6b5;
  background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 13px;}
.brf-pt .k{flex-shrink:0;width:20px;height:20px;border-radius:7px;background:#d9ab3c;color:#1d1812;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;}

/* ── HOME: KPI 타일 ───────────────────────────────────────── */
.statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px;margin:0 0 20px;}
.stat{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-md);padding:16px 14px 13px;
  text-align:left;cursor:pointer;transition:border .15s,transform .15s;}
.stat:hover{border-color:var(--gold-border);transform:translateY(-2px);}
.stat .v{font-family:'JetBrains Mono',monospace;font-size:23px;font-weight:600;line-height:1.1;color:var(--text);}
.stat .l{margin-top:5px;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);font-weight:600;}
.stat .go{color:var(--gold);opacity:0;transition:.15s;}
.stat:hover .go{opacity:1;}

/* ── 차트/지수 ────────────────────────────────────────────── */
.idx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:12px;}
.idx-cell{background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--r-md);padding:14px;}
.idx-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-3);margin-bottom:8px;font-family:'JetBrains Mono',monospace;}
.idx-h i{width:9px;height:9px;border-radius:3px;display:inline-block;}
.idx-chart{position:relative;height:170px;}

/* ── 칩/태그/배지 ─────────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:6px;margin:0 6px 8px 0;padding:6px 13px;border-radius:999px;
  background:var(--surface);border:1px solid var(--border);font-size:12.5px;font-weight:500;cursor:pointer;transition:.15s;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip .n{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-4);}
.tag{display:inline-block;margin:0 5px 6px 0;padding:2px 10px;border-radius:8px;background:var(--surface-2);
  border:1px solid var(--border-light);font-size:11.5px;cursor:pointer;transition:.15s;}
.tag:hover{border-color:var(--gold);color:var(--gold);}
.rep-badge{display:inline-block;font-size:10px;font-weight:700;color:var(--gold);background:var(--gold-bg);
  border:1px solid var(--gold-border);border-radius:999px;padding:1px 8px;}
.mo-chip{display:inline-block;font-size:10.5px;font-weight:600;border-radius:999px;padding:1px 9px;border:1px solid transparent;}
.mo-hot{color:var(--red);background:var(--red-bg);border-color:color-mix(in srgb,var(--red) 30%,transparent);}
.mo-warm{color:var(--gold);background:var(--gold-bg);border-color:var(--gold-border);}
.mo-cool{color:var(--blue);background:var(--blue-bg);border-color:color-mix(in srgb,var(--blue) 30%,transparent);}
.mo-flat{color:var(--text-3);background:var(--surface-2);border-color:var(--border-light);}
.pill{display:inline-block;font-size:10.5px;font-weight:600;border-radius:999px;padding:1px 9px;margin-right:5px;}
.pill.theme{color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);}
.pill.supply{color:var(--blue);background:var(--blue-bg);border:1px solid color-mix(in srgb,var(--blue) 28%,transparent);}
.pill.tp{color:var(--green);background:var(--green-bg);border:1px solid color-mix(in srgb,var(--green) 28%,transparent);}
.src-pill{display:inline-block;font-size:10px;font-weight:700;border-radius:6px;padding:1px 7px;margin-right:6px;letter-spacing:.5px;}
.src-pill.테마{color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);}
.src-pill.수급{color:var(--blue);background:var(--blue-bg);border:1px solid color-mix(in srgb,var(--blue) 28%,transparent);}
.src{font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px;}
.star{background:transparent;border:0;cursor:pointer;font-size:15px;color:var(--text-4);padding:2px 5px;transition:.15s;line-height:1;}
.star:hover{color:var(--gold);transform:scale(1.15);}
.star.on{color:var(--gold);}
.watch-empty{font-size:12px;color:var(--text-4);padding:8px 2px;}

/* ── 이벤트 카드 ──────────────────────────────────────────── */
.evscroll{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none;}
.evscroll::-webkit-scrollbar{display:none;}
.evcard{flex:0 0 262px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--r-md);padding:14px 16px;}
.evcard .ed{font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;margin-bottom:5px;}
.evcard .et{font-size:13px;font-weight:700;line-height:1.5;margin-bottom:5px;}
.evcard .ex{font-size:11.5px;color:var(--text-3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

/* ── 전략 카드(홈) ────────────────────────────────────────── */
.now-strat{background:var(--surface-2);border-left:3px solid var(--gold);border-radius:0 var(--r-md) var(--r-md) 0;padding:16px 20px;}
.now-strat .q{font-family:'Playfair Display','Noto Serif KR',serif;font-size:15.5px;font-weight:600;line-height:1.75;}
.now-strat cite{display:block;margin-top:8px;font-style:normal;font-size:11px;color:var(--text-4);font-family:'JetBrains Mono',monospace;}
.core-head{margin:22px 0 10px;font-size:13.5px;font-weight:700;}
.core-grid{display:grid;gap:10px;}
.core-sec{background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--r-md);padding:14px 16px;}
.core-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.core-rank{width:23px;height:23px;border-radius:8px;background:var(--gold);color:#fff;font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.core-name{font-weight:700;font-size:14.5px;}
.core-why{margin-top:7px;font-size:12.5px;color:var(--text-2);line-height:1.7;}
.core-why .lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-right:5px;}
.core-meta{margin-top:7px;font-size:11px;color:var(--text-4);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.core-chip{display:inline-block;padding:1px 9px;border-radius:8px;background:var(--surface);border:1px solid var(--border);font-size:11px;cursor:pointer;}
.core-chip:hover{border-color:var(--gold);color:var(--gold);}

/* ── 마켓 펄스 ────────────────────────────────────────────── */
.pulse-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin:0 0 20px;}
.pulse-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-md);padding:16px 18px;}
.pulse-card.primary{border-color:var(--gold-border);background:linear-gradient(160deg,var(--gold-bg),var(--surface));}
.pulse-k{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:'JetBrains Mono',monospace;}
.pulse-h{font-size:15px;font-weight:700;margin:5px 0 3px;}
.pulse-desc{font-size:11.5px;color:var(--text-3);line-height:1.6;}
.pulse-row{display:flex;align-items:baseline;gap:8px;margin-top:6px;flex-wrap:wrap;}
.pulse-metric{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;}
.pulse-mini{font-size:10.5px;color:var(--text-4);}
@media(max-width:900px){.pulse-grid{grid-template-columns:1fr;}}

/* ── 섹터 카드 ────────────────────────────────────────────── */
.cluster{display:grid;gap:12px;}
.scard{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:18px 20px;transition:border .15s;}
.scard:hover{border-color:var(--border);}
.scard-head{display:flex;align-items:center;gap:11px;cursor:pointer;flex-wrap:wrap;}
.scard-rank{width:26px;height:26px;border-radius:9px;background:var(--surface-3);color:var(--text-2);
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.scard-name{font-weight:700;font-size:15.5px;}
.scard-stocks{margin-top:9px;}
.scard-detail{display:none;margin-top:12px;border-top:1px dashed var(--border);padding-top:12px;}
.scard-detail.open{display:block;}
.intensity{flex:1;min-width:80px;height:5px;border-radius:3px;background:var(--surface-3);overflow:hidden;}
.intensity i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold-2));}
.scard-trend{font-size:11px;color:var(--text-4);}
.mini-tl{font-size:12.5px;color:var(--text-2);line-height:1.7;}
.mini-tl .d{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--gold);margin-right:7px;}
.mini-tl .row{padding:9px 0;border-bottom:1px solid var(--border-light);}
.mini-tl .row:last-child{border-bottom:none;}
.toggle{background:transparent;border:0;color:var(--gold);font-size:11.5px;font-weight:600;cursor:pointer;margin-left:auto;}

/* ── 종목 ─────────────────────────────────────────────────── */
.controls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.controls input{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:8px 13px;
  font-size:13px;color:var(--text);font-family:inherit;outline:0;min-width:170px;transition:.15s;}
.controls input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg);}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:3px;gap:2px;}
.seg button{border:0;background:transparent;color:var(--text-3);font-size:12px;font-weight:500;padding:5px 12px;border-radius:8px;cursor:pointer;transition:.15s;}
.seg button.on{background:var(--surface);color:var(--text);font-weight:700;box-shadow:0 1px 3px var(--shadow);}
.stock-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.check-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);background:var(--surface);
  border:1px solid var(--border);border-radius:999px;padding:5px 13px;cursor:pointer;transition:.15s;user-select:none;}
.check-chip:hover{border-color:var(--gold);}
.check-chip input{accent-color:var(--gold);}
.strow{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-md);margin-bottom:9px;transition:border .15s;}
.strow:hover{border-color:var(--border);}
.strow-head{display:flex;align-items:center;gap:11px;padding:13px 17px;cursor:pointer;flex-wrap:wrap;}
.strow-head:hover{background:transparent;}
.strow-name{font-weight:700;font-size:14.5px;min-width:120px;}
.strow-mini{font-size:11px;color:var(--text-4);}
.strow-cnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-3);}
.strow-spark{width:84px;height:28px;flex-shrink:0;}
.strow-detail{display:none;border-top:1px dashed var(--border);padding:13px 17px;}
.strow-detail.open{display:block;}
.stock-meta-line{margin-left:auto;font-size:11px;color:var(--text-4);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.mention{padding:11px 0;border-bottom:1px solid var(--border-light);font-size:12.5px;line-height:1.7;color:var(--text-2);}
.mention:last-child{border-bottom:none;}
.mention .md{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-4);margin-right:7px;}
.cmp-add{border:1px solid var(--border);background:var(--surface);color:var(--text-3);font-size:11px;font-weight:600;
  border-radius:999px;padding:2px 11px;cursor:pointer;transition:.15s;}
.cmp-add:hover,.cmp-add.on{border-color:var(--gold);color:var(--gold);background:var(--gold-bg);}
@media(max-width:760px){.strow-head{align-items:flex-start;flex-wrap:wrap;}.strow-name{min-width:88px;}
  .strow-spark{order:5;width:100%;height:30px;}.stock-meta-line{margin-left:0;width:100%;}}

/* ── 전략 타임라인 ────────────────────────────────────────── */
.stl{position:relative;padding-left:26px;}
.stl::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;border-radius:2px;
  background:linear-gradient(180deg,var(--gold-border),var(--border));}
.stl-item{position:relative;padding:0 0 26px;}
.stl-dot{position:absolute;left:-26px;top:5px;width:14px;height:14px;border-radius:50%;background:var(--gold);
  border:3px solid var(--bg);box-shadow:0 0 0 1.5px var(--gold-border);}
.stl-dot.w{background:var(--purple);box-shadow:0 0 0 1.5px color-mix(in srgb,var(--purple) 40%,transparent);}
.stl-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);font-weight:600;}
.stl-head{font-weight:700;font-size:14.5px;margin:3px 0;}
.stl-quote{font-size:13px;color:var(--text-2);line-height:1.75;font-style:italic;border-left:2px solid var(--gold-border);
  padding:6px 13px;margin:7px 0;background:var(--surface-2);border-radius:0 10px 10px 0;}
.stl-points{font-size:12px;color:var(--text-3);line-height:1.8;}
.pcard{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-md);padding:15px 18px;margin-bottom:10px;}
.pcard-head{display:flex;align-items:center;gap:11px;cursor:pointer;flex-wrap:wrap;}
.pcard-ico{font-size:18px;}
.pcard-name{font-weight:700;font-size:13.5px;flex:1;}
.pcard-meta{font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;}
.pbar{width:110px;height:5px;border-radius:3px;background:var(--surface-3);overflow:hidden;flex-shrink:0;}
.pbar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold-2));}
.pcard-detail{display:none;margin-top:11px;border-top:1px dashed var(--border);padding-top:10px;font-size:12.5px;color:var(--text-2);line-height:1.75;}
.pcard-detail.open{display:block;}

/* ── 용어집 ───────────────────────────────────────────────── */
.gcard{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-md);padding:16px 19px;margin-bottom:10px;}
.gterm{font-weight:700;font-size:14.5px;}
.gtag{display:inline-block;font-size:10px;font-weight:700;color:var(--cyan);background:var(--cyan-bg);
  border-radius:6px;padding:1px 8px;margin-left:8px;vertical-align:1px;}
.gbody{margin-top:6px;font-size:12.5px;color:var(--text-2);line-height:1.75;}
.gdate{margin-top:7px;font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;}

/* ── 관계망 ───────────────────────────────────────────────── */
.graph-wrap{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);position:relative;overflow:hidden;}
.graph-canvas{display:block;width:100%;height:560px;cursor:grab;touch-action:none;}
.graph-canvas:active{cursor:grabbing;}
.graph-controls{position:absolute;top:14px;left:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;z-index:5;}
.graph-legend{position:absolute;left:14px;bottom:12px;display:flex;gap:13px;z-index:5;background:color-mix(in srgb,var(--surface) 82%,transparent);backdrop-filter:blur(6px);border:1px solid var(--border-light);border-radius:999px;padding:5px 14px;}
.glg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3);}
.glg i{width:9px;height:9px;border-radius:50%;display:inline-block;}
.graph-hint{position:absolute;right:14px;bottom:12px;font-size:10.5px;color:var(--text-4);z-index:5;}
.graph-tip{position:fixed;z-index:90;background:var(--surface);border:1px solid var(--border);border-radius:12px;
  box-shadow:0 10px 36px rgba(20,14,4,.2);padding:9px 13px;pointer-events:none;opacity:0;transition:opacity .12s;max-width:260px;}
.graph-tip.on{opacity:1;}
.graph-tip .gt-name{font-weight:700;font-size:13px;}
.graph-tip .gt-meta{font-size:11px;color:var(--text-3);}

/* ── 팝오버 ───────────────────────────────────────────────── */
#popover{position:fixed;z-index:95;width:min(380px,92vw);background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:0 22px 70px rgba(20,14,4,.25);padding:17px 19px;opacity:0;pointer-events:none;
  transform:translateY(6px);transition:opacity .15s,transform .15s;}
:root[data-theme="dark"] #popover{box-shadow:0 22px 70px rgba(0,0,0,.65);}
#popover.on{opacity:1;pointer-events:auto;transform:none;}
.pv-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.pv-kind{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:6px;padding:1px 7px;}
.pv-name{font-weight:700;font-size:15px;}
.pv-cnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);}
.pv-pills{margin:8px 0 2px;}
.pv-spark{width:100%;height:34px;display:block;margin:4px 0 8px;}
.pv-note{font-size:12px;color:var(--text-2);line-height:1.7;}
.pv-note .pvd{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--gold);margin-right:6px;}
.pv-foot{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}

/* ── 리포트 모달 ──────────────────────────────────────────── */
.rmodal{position:fixed;inset:0;z-index:120;display:none;}
.rmodal.open{display:block;}
.rmodal-bd{position:absolute;inset:0;background:rgba(12,9,4,.55);backdrop-filter:blur(4px);opacity:0;transition:opacity .2s;}
.rmodal.open .rmodal-bd{opacity:1;}
.rmodal-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-46%);width:min(1000px,94vw);height:88vh;
  background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 28px 90px rgba(0,0,0,.45);
  display:flex;flex-direction:column;overflow:hidden;opacity:0;transition:opacity .2s,transform .2s;}
.rmodal.open .rmodal-box{opacity:1;transform:translate(-50%,-50%);}
.rmodal-head{display:flex;align-items:center;gap:11px;padding:13px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.rmodal-kind{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:6px;padding:2px 9px;}
.rmodal-title{font-weight:700;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rmodal-title .rm-date{color:var(--text-4);font-family:'JetBrains Mono',monospace;font-size:11.5px;margin-right:7px;}
.rmodal-jump{display:none;border:1px solid var(--gold-border);background:var(--gold-bg);color:var(--gold);font-size:11.5px;font-weight:600;border-radius:999px;padding:3px 13px;cursor:pointer;}
.rmodal-jump.show{display:inline-block;}
.rmodal-open{font-size:11.5px;font-weight:600;color:var(--text-3);text-decoration:none;border:1px solid var(--border);border-radius:999px;padding:3px 13px;}
.rmodal-open:hover{border-color:var(--gold);color:var(--gold);}
.rmodal-close{border:0;background:var(--surface-2);width:30px;height:30px;border-radius:10px;cursor:pointer;color:var(--text-3);font-size:13px;}
.rmodal-close:hover{background:var(--surface-3);color:var(--text);}
.rmodal-body{flex:1;position:relative;background:var(--bg);}
.rmodal-frame{width:100%;height:100%;border:0;display:block;}
.rmodal-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-3);background:var(--bg);}
.rmodal-load.hide{display:none;}
@media(max-width:640px){.rmodal-box{width:100vw;height:100vh;height:100dvh;border-radius:0;top:0;left:0;transform:none;}
  .rmodal.open .rmodal-box{transform:none;}.rmodal-open{display:none;}}

/* ── 비교 트레이/모달 ─────────────────────────────────────── */
.cmp-tray{position:fixed;left:50%;bottom:18px;transform:translate(-50%,140%);z-index:100;display:flex;align-items:center;gap:10px;
  background:var(--side-bg);color:var(--side-text);border:1px solid var(--side-line);border-radius:999px;padding:9px 10px 9px 19px;
  box-shadow:0 14px 50px rgba(0,0,0,.35);transition:transform .25s;max-width:92vw;}
.cmp-tray.on{transform:translate(-50%,0);}
.cmp-title{font-size:12px;font-weight:700;color:var(--side-gold);white-space:nowrap;}
.cmp-items{display:flex;gap:6px;flex-wrap:wrap;}
.cmp-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid var(--side-line);
  border-radius:999px;padding:2px 6px 2px 11px;font-size:11.5px;}
.cmp-pill button{border:0;background:transparent;color:var(--side-dim);cursor:pointer;font-size:11px;}
.cmp-act{border:0;background:var(--side-gold);color:#1d1812;font-size:12px;font-weight:700;border-radius:999px;padding:7px 16px;cursor:pointer;}
.cmp-clear{border:0;background:transparent;color:var(--side-dim);font-size:11.5px;cursor:pointer;padding:6px 8px;}
.cmp-modal{position:fixed;inset:0;z-index:110;display:none;}
.cmp-modal.open{display:block;}
.cmp-back{position:absolute;inset:0;background:rgba(12,9,4,.55);backdrop-filter:blur(4px);}
.cmp-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(1040px,94vw);max-height:88vh;overflow:auto;
  background:var(--surface);border:1px solid var(--border);border-radius:22px;box-shadow:0 28px 90px rgba(0,0,0,.45);}
.cmp-head{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:16px 22px;
  background:var(--surface);border-bottom:1px solid var(--border);z-index:2;}
.cmp-head h3{font-family:'Playfair Display','Noto Serif KR',serif;font-size:18px;}
.cmp-close{border:0;background:var(--surface-2);width:30px;height:30px;border-radius:10px;cursor:pointer;color:var(--text-3);}
.cmp-body{padding:20px 22px;}
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.cmp-card{background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--r-md);padding:16px 18px;}
.cmp-name{font-weight:700;font-size:15px;margin-bottom:4px;}
.cmp-spark{width:100%;height:44px;display:block;margin:4px 0 10px;background:var(--surface);border-radius:10px;}
.cmp-kv{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0;}
.cmp-kv div{background:var(--surface);border:1px solid var(--border-light);border-radius:10px;padding:7px 11px;font-size:11px;color:var(--text-3);}
.cmp-kv b{display:block;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text);font-weight:600;}
.cmp-kv span{font-size:10px;}
.cmp-note{font-size:11.5px;color:var(--text-3);line-height:1.65;}
.cmp-themes{margin:6px 0;}
@media(max-width:640px){.cmp-tray{left:10px;right:10px;bottom:calc(64px + env(safe-area-inset-bottom));transform:translateY(240%);max-width:none;justify-content:space-between;}
  .cmp-tray.on{transform:translateY(0);}.cmp-title{display:none;}
  .cmp-box{width:100vw;height:100vh;max-height:100vh;border-radius:0;}
  .cmp-head{padding-top:calc(14px + env(safe-area-inset-top));}}

/* ── 커맨드 팔레트 ────────────────────────────────────────── */
.cmdk{position:fixed;inset:0;z-index:130;display:none;}
.cmdk.open{display:block;}
.cmdk-back{position:absolute;inset:0;background:rgba(12,9,4,.5);backdrop-filter:blur(4px);}
.cmdk-box{position:absolute;top:11vh;left:50%;transform:translateX(-50%);width:min(700px,92vw);
  background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 28px 90px rgba(0,0,0,.42);overflow:hidden;}
.cmdk-search{display:flex;align-items:center;gap:11px;padding:15px 19px;border-bottom:1px solid var(--border);}
.cmdk-search span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:7px;padding:2px 8px;}
.cmdk-search input{flex:1;border:0;outline:0;background:transparent;color:var(--text);font-size:15px;font-family:inherit;}
.cmdk-list{max-height:52vh;overflow:auto;padding:8px;}
.cmdk-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:12px;cursor:pointer;}
.cmdk-item:hover,.cmdk-item.active{background:var(--surface-2);}
.cmdk-kind{font-size:10px;font-weight:700;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:6px;padding:1px 8px;flex-shrink:0;}
.cmdk-main{font-weight:600;font-size:13.5px;}
.cmdk-sub{font-size:11.5px;color:var(--text-4);margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46%;}
.cmdk-empty{padding:28px;text-align:center;color:var(--text-4);font-size:13px;}
.cmdk-foot{display:flex;gap:15px;padding:9px 19px;border-top:1px solid var(--border);font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;}
@media(max-width:640px){.cmdk-box{top:6vh;width:94vw;}.cmdk-search input{font-size:15px;}}

/* ── 분석 탭 ──────────────────────────────────────────────── */
.an-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:24px;margin-bottom:18px;}
.an-title{font-family:'Playfair Display','Noto Serif KR',serif;font-size:17px;font-weight:700;margin-bottom:2px;}
.an-sub{font-size:12px;color:var(--text-3);margin-bottom:14px;}
.hm-wrap{overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.hm{border-collapse:separate;border-spacing:3px;}
.hm th{font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--text-3);font-weight:500;padding:2px 4px;text-align:center;white-space:nowrap;}
.hm th.rowh{text-align:right;padding-right:9px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text-2);cursor:pointer;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hm th.rowh:hover{color:var(--gold);}
.hm td.cell{min-width:32px;height:27px;border-radius:7px;background:var(--surface-2);text-align:center;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--text-3);}
.hm td.cell.c1{background:var(--gold-bg);color:var(--text-2);}
.hm td.cell.c2{background:var(--gold-border);color:var(--text);}
.hm td.cell.c3{background:var(--gold);color:#fff;font-weight:700;}
.mo-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.mo-col{background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--r-md);padding:15px;}
.mo-col h4{font-size:13px;margin-bottom:8px;}
.mo-item{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:6px 9px;border-radius:9px;cursor:pointer;font-size:13px;}
.mo-item:hover{background:var(--surface-3);}
.mo-item .r{font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.sr-row{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px solid var(--border-light);flex-wrap:wrap;}
.sr-row:last-child{border-bottom:none;}
.sr-rank{width:22px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-4);text-align:right;flex-shrink:0;}
.sr-name{font-weight:700;font-size:13.5px;cursor:pointer;min-width:110px;}
.sr-name:hover{color:var(--gold);}
.sr-total{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:999px;padding:1px 9px;flex-shrink:0;}
.sr-tags{display:flex;gap:5px;flex-wrap:wrap;}
.sr-tag{font-size:10.5px;border-radius:999px;padding:1px 8px;border:1px solid var(--border);color:var(--text-2);background:var(--surface-2);}
.sr-tag b{font-family:'JetBrains Mono',monospace;font-weight:600;}
.sr-last{margin-left:auto;font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;}
@media(max-width:760px){.mo-cols{grid-template-columns:1fr;}.sr-last{display:none;}.sr-name{min-width:90px;}.an-card{padding:17px;}}

/* ── AI 다이제스트 ────────────────────────────────────────── */
.aid{border-color:var(--gold-border);background:linear-gradient(165deg,var(--gold-bg) 0%,var(--surface) 30%);}
.aid-title{font-family:'Playfair Display','Noto Serif KR',serif;font-size:18px;font-weight:700;margin:4px 0 8px;}
.aid-sum{font-size:13.5px;line-height:1.8;color:var(--text-2);max-width:820px;}
.aid-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:9px;margin-top:13px;}
.aid-item{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-sm);padding:10px 13px;font-size:12px;line-height:1.6;}
.aid-item b{display:block;font-size:12.5px;margin-bottom:2px;}
.aid-item span{color:var(--text-3);}
.aid-risks{margin:0;padding-left:18px;font-size:12.5px;color:var(--text-2);line-height:1.8;}

/* ── 리포트 캘린더 ────────────────────────────────────────── */
.cal-wrap{display:flex;gap:3px;overflow-x:auto;padding:4px 2px 8px;-webkit-overflow-scrolling:touch;}
.cal-col{display:flex;flex-direction:column;gap:3px;}
.cal-col i{width:14px;height:14px;border-radius:4px;background:var(--surface-3);display:block;}
.cal-on{background:var(--gold)!important;cursor:pointer;transition:transform .1s;}
.cal-on:hover{transform:scale(1.25);}
.cal-on.cal-w{background:var(--purple)!important;}

/* ── 스크리너 셀렉트 ─────────────────────────────────────── */
.sel{background:var(--surface);border:1px solid var(--border);border-radius:999px;color:var(--text-2);
  font-size:12px;font-family:inherit;padding:5px 11px;cursor:pointer;outline:0;max-width:160px;}
.sel:focus{border-color:var(--gold);}

/* ── 푸터 ─────────────────────────────────────────────────── */
.foot{padding:36px 28px 110px;text-align:center;border-top:1px solid var(--border-light);margin-top:30px;}
.foot .logo{font-family:'Playfair Display','Noto Serif KR',serif;font-size:21px;font-weight:700;color:var(--gold);margin-bottom:6px;}
.foot p{font-size:11.5px;color:var(--text-4);}

/* ── 모바일 하단 네비 ─────────────────────────────────────── */
.bnav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:85;background:var(--topbar-bg);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);padding:5px 4px calc(5px + env(safe-area-inset-bottom));overflow-x:auto;scrollbar-width:none;}
.bnav::-webkit-scrollbar{display:none;}
.bnav .tab{flex:1 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:58px;padding:5px 7px;
  border:0;background:transparent;color:var(--text-3);font-size:10px;font-weight:600;border-radius:10px;cursor:pointer;}
.bnav .tab .t-ico{font-size:17px;width:auto;opacity:1;}
.bnav .tab.active{color:var(--gold);background:var(--gold-bg);}
.bnav .tab.active::before{display:none;}

/* ── 반응형 ───────────────────────────────────────────────── */
@media(max-width:940px){
  .side{display:none;}
  .main{margin-left:0;}
  .bnav{display:flex;}
  .m-logo{display:block;}
  .topbar-inner{padding:10px 16px;}
  .searchbox::after{content:'/';}
  .page{padding:18px 16px;}
  .brf-h{font-size:22px;}
  .foot{padding-bottom:130px;}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}}

window.DATA = /*DATA*/{"build":{"reports":0,"daily":0,"weekly":0,"from":"","to":"","generated":""},"reports":[],"search":[],"stocks":[],"sectors":[],"supply_days":[],"stance":[],"principles":[],"glossary":[],"series":{}}/*ENDDATA*/;

<script>
const D = window.DATA || {};
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const esc = s => (s==null?'':(''+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// id → 원문 파일 매핑
const FILE = {};
(D.reports||[]).forEach(r=>{ if(r.id&&r.file) FILE[r.id]=r.file; });
const srcLink = (id,q) => (id&&FILE[id]) ? `<a class="src" href="${esc(FILE[id])}" data-report="${esc(id)}"${q?` data-q="${esc(q)}"`:''}>원문↗</a>` : '';
const fmtDate = d => !d?'' : (/^\d{4}-W/.test(d) ? d.replace('-',' ') : (d.length>=10? d.slice(5).replace('-','/'):d));
const RECENT_LABEL = (()=>{const rf=(D.build&&D.build.recent_from)||''; return rf? ('최근 1개월 · '+fmtDate(rf)+'~ 기준 · 언급순') : '최근 1개월 · 언급순';})();
// 섹터의 '근거' = note 있는 최신 멘션
function sectorWhy(s){const ms=(s.mentions||[]);
  for(let i=ms.length-1;i>=0;i--){const n=ms[i].note||'';if(n.length>12&&(n.includes('대표님')||n.includes('이혜나')))return ms[i];}  // 대표님 언급 근거 우선
  for(let i=ms.length-1;i>=0;i--){if(ms[i].note&&ms[i].note.length>12)return ms[i];}
  return ms.length?ms[ms.length-1]:null;}

/* ───────── TABS ───────── */
const TABS=['home','sectors','stocks','analytics','trade','strategy','glossary','graph'];
function showTab(name,fromHash){
  if(!TABS.includes(name))name='home';
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  $$('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+name));
  if(name==='trade'){const f=document.getElementById('tradeFrame');if(f&&!f.getAttribute('src'))f.setAttribute('src',f.dataset.src);}
  if(typeof graphSetActive==='function') graphSetActive(name==='graph');
  if(!fromHash){ try{history.replaceState(null,'','#'+name);}catch(e){} window.scrollTo({top:0,behavior:'smooth'}); }
}
$('#tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(b)showTab(b.dataset.tab);});
const _bn=document.getElementById('bnav'); if(_bn)_bn.addEventListener('click',e=>{const b=e.target.closest('.tab');if(b)showTab(b.dataset.tab);});
function tabFromHash(){
  let h=''; try{h=decodeURIComponent((location.hash||'').replace('#',''));}catch(e){h=(location.hash||'').replace('#','');}
  const ix=h.indexOf('/'); const t=ix<0?h:h.slice(0,ix); const arg=ix<0?'':h.slice(ix+1);
  if(!TABS.includes(t))return;
  showTab(t,true);
  if(!arg)return;
  if(t==='stocks'){stockQuery=arg;stockSort='count';renderStocks();const first=$('#stockList .strow-detail');if(first)first.classList.add('open');}
  else if(t==='sectors'){setTimeout(()=>{const card=$$('#view-sectors .scard').find(c=>c.querySelector('.scard-name')?.textContent===arg); if(card){card.querySelector('.scard-detail').classList.add('open');card.scrollIntoView({block:'center'});}},80);}
  else if(t==='glossary'){glossQuery=arg;renderGlossary();}
}
window.addEventListener('hashchange',tabFromHash);

/* ───────── HOME ───────── */
function renderHome(){
  const b=D.build||{};
  const tzLabel = b.timezone_label || '한국시간(KST)';
  $('#buildMeta').textContent = `${b.from||''} ~ ${b.to||''} · 갱신 ${b.generated||''} ${tzLabel}`;
  const topSectors=(D.sectors||[]).slice(0,6);
  const topStocks=(D.stocks||[]).slice(0,10);
  const latest=(D.stance||[]).slice(-1)[0]||{};
  const topPrin=(D.principles||[]).slice(0,4);
  const REP_W=2;  // 대표님 직접 언급 가중치
  const coreSectors=(D.sectors||[]).map(s=>({s,why:sectorWhy(s),score:(s.count||0)+REP_W*(s.rep||0)}))
    .filter(x=>x.why).sort((a,b)=>(b.score-a.score)||(b.s.count-a.s.count)).slice(0,5);
  $('#view-home').innerHTML = `
    <div class="briefing"><div class="brf-in">
      <div class="brf-tag"><span class="live"></span>오늘의 브리핑<span class="brf-date">${esc(fmtDate(latest.date))} · ${esc(latest.name||'프벤져스')}</span></div>
      <div class="brf-h">${esc(latest.headline||'흩어진 리포트를 하나의 전략으로')}</div>
      ${latest.subhead?`<div class="brf-sub">${esc(latest.subhead)}</div>`:`<div class="brf-sub">데일리·위클리 리포트를 구조화해, 섹터·종목·전략·용어를 한곳에서 검색하고 점검합니다.</div>`}
      ${(latest.quote||latest.report_quote)?`<div class="brf-quote">${esc(latest.quote||latest.report_quote)}<cite>— ${esc(latest.name||'프벤져스')}, ${esc(fmtDate(latest.date))}</cite></div>`:''}
      ${(latest.points||[]).length?`<div class="brf-points">${(latest.points||[]).slice(0,4).map((p,i)=>`<div class="brf-pt"><span class="k">${i+1}</span><span>${esc(p)}</span></div>`).join('')}</div>`:''}
    </div></div>
    ${aiDigestCard()}
    <div class="statrow">
      <button class="stat" data-go="strategy"><div class="v">${b.reports||0}</div><div class="l">리포트 <span class="go">→</span></div></button>
      <button class="stat" data-go="strategy"><div class="v">${b.daily||0}</div><div class="l">데일리</div></button>
      <button class="stat" data-go="strategy"><div class="v">${b.weekly||0}</div><div class="l">위클리</div></button>
      <button class="stat" data-go="stocks"><div class="v">${(D.stocks||[]).length}</div><div class="l">종목 <span class="go">→</span></div></button>
      <button class="stat" data-go="sectors"><div class="v">${(D.sectors||[]).length}</div><div class="l">섹터 <span class="go">→</span></div></button>
      <button class="stat" data-go="glossary"><div class="v">${(D.glossary||[]).length}</div><div class="l">용어 <span class="go">→</span></div></button>
      <button class="stat" data-go="analytics"><div class="v">📊</div><div class="l">분석 <span class="go">→</span></div></button>
    </div>
    <div id="watchHome"></div>
    <div id="watchDigest"></div>
    ${calendarCard()}
    ${(D.events||[]).length?`<div class="card">
      <div class="sec-title" style="margin:0 0 4px;font-size:17px">📅 최근 포착된 일정·이벤트 <span class="count-badge">${(D.events||[]).length}</span></div>
      <div class="sec-sub">리포트에서 추출한 실적·정책·수급 이벤트 — 최근 포착순</div>
      <div class="evscroll">${eventCards()}</div>
    </div>`:''}
    <div class="card">
      <div class="sec-title" style="margin:0 0 4px;font-size:17px">📉 지수 추이</div>
      <div class="sec-sub">KOSPI · KOSDAQ · 나스닥 — 일별 종가 · 독립 3분할 · ${(b.index_source==='yfinance')?'야후 파이낸스 연동(정확·무오차)':'리포트 추출값'}</div>
      <div class="idx-grid">
        <div class="idx-cell"><div class="idx-h"><i style="background:#dc2626"></i>KOSPI</div><div class="idx-chart"><canvas id="cKOSPI"></canvas></div></div>
        <div class="idx-cell"><div class="idx-h"><i style="background:#2563eb"></i>KOSDAQ</div><div class="idx-chart"><canvas id="cKOSDAQ"></canvas></div></div>
        <div class="idx-cell"><div class="idx-h"><i style="background:#7c3aed"></i>나스닥</div><div class="idx-chart"><canvas id="cNAS"></canvas></div></div>
      </div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin:0 0 4px;font-size:17px">🧭 지금 살아있는 전략</div>
      <div class="sec-sub">최신 스탠스 · 반복 강화된 원칙 · 프벤져스 코어 섹터</div>
      <div class="now-strat">
        <div class="q">“${esc((latest.quote||latest.report_quote||'').slice(0,160))}”</div>
        <cite>— ${esc(latest.name||'프벤져스')}, ${esc(fmtDate(latest.date))} · ${esc(latest.headline||'')}</cite>
      </div>
      <div style="margin-top:14px">
        ${topPrin.map(p=>`<span class="chip" data-go="strategy">${p.icon} ${esc(p.principle.split(' — ')[0])} <span class="n">${p.count}</span></span>`).join('')}
      </div>
      <div class="core-head">🎯 프벤져스 코어 섹터 TOP 5 <span style="font-weight:400;color:var(--text-4)">· 최근 1개월 기준</span></div>
      <div class="core-grid">
      ${coreSectors.map((x,i)=>{const s=x.s,w=x.why; const note=(w.note||''); const short=note.length>200?note.slice(0,198)+'…':note; const chips=(s.stocks||[]).slice(0,4).map(n=>`<span class="core-chip" data-stock="${esc(n)}">${esc(n)}</span>`).join(''); const repBadge=(s.rep||0)>0?`<span class="rep-badge">👑 대표님 강조 ${s.rep}</span>`:''; return `
        <div class="core-sec">
          <div class="core-top"><span class="core-rank">${i+1}</span><span class="core-name">${esc(s.theme)}</span><span class="count-badge">${s.count}회</span>${repBadge}</div>
          <div class="core-why"><span class="lbl">근거</span> ${esc(short)}</div>
          <div class="core-meta">${esc(fmtDate(w.date))} 기준 ${srcLink(w.id)} ${chips}</div>
        </div>`;}).join('') || '<div style="font-size:12px;color:var(--text-4);margin-top:8px">근거 있는 섹터 데이터가 아직 없습니다.</div>'}
      </div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin:0 0 4px;font-size:17px">🔥 최다 등장 섹터·종목</div>
      <div class="sec-sub">${RECENT_LABEL} 빈도 상위 — 클릭하면 해당 탭으로</div>
      <div style="margin-bottom:6px;font-size:12px;color:var(--text-3)">섹터·테마</div>
      <div>${topSectors.map(s=>`<span class="chip" data-go="sectors" data-sector="${esc(s.theme)}">${esc(s.theme)} <span class="n">${s.count}</span></span>`).join('')}</div>
      <div style="margin:12px 0 6px;font-size:12px;color:var(--text-3)">종목</div>
      <div>${topStocks.map(s=>`<span class="chip" data-go="stocks" data-stock="${esc(s.name)}">${esc(s.name)} <span class="n">${s.count}</span></span>`).join('')}</div>
    </div>`;
  drawTrend(); renderWatchHome(); renderDigest();
  const _cw=$('#calWrap'); if(_cw)_cw.addEventListener('click',e=>{const i=e.target.closest('.cal-on'); if(i)openReport(i.dataset.rid);});
}
/* ── AI 위클리 다이제스트 (AlphaSense Smart Summaries 벤치마크) ── */
function aiDigestCard(){
  const w=D.ai_digest, a=w&&w.digest; if(!a) return '';
  const th=(a.themes||[]).map(t=>`<div class="aid-item"><b>${esc(t.name||'')}</b><span>${esc(t.note||'')}</span></div>`).join('');
  const stx=(a.stocks||[]).filter(n=>STOCK_BY_NAME[n]).map(n=>`<span class="tag" data-stock="${esc(n)}">${esc(n)}</span>`).join('');
  const rk=(a.risks||[]).map(r=>`<li>${esc(r)}</li>`).join('');
  return `<div class="card aid">
    <div class="sec-title" style="margin:0 0 4px;font-size:17px">🤖 AI 위클리 다이제스트</div>
    <div class="sec-sub">최근 7일 리포트를 AI가 요약 · ${esc(w.generated||'')} 생성 · 투자 판단의 참고용</div>
    ${a.title?`<div class="aid-title">"${esc(a.title)}"</div>`:''}
    <div class="aid-sum">${esc(a.summary||'')}</div>
    ${th?`<div class="aid-grid">${th}</div>`:''}
    ${stx?`<div style="margin-top:12px"><div style="font-size:11.5px;color:var(--text-3);margin-bottom:4px">주목 종목</div>${stx}</div>`:''}
    ${rk?`<div style="margin-top:12px"><div style="font-size:11.5px;color:var(--text-3);margin-bottom:4px">리스크 체크</div><ul class="aid-risks">${rk}</ul></div>`:''}
  </div>`;
}
/* ── 리포트 캘린더 (Logseq 데일리노트 벤치마크) ── */
function calendarCard(){
  const reps=(D.reports||[]).filter(r=>r.sort_date&&r.sort_date<='9999');
  const from=dnum((D.build&&D.build.from)||''), to=TO_DAY;
  if(!reps.length||from==null) return '';
  const byDay={};
  reps.forEach(r=>{const k=r.sort_date; if(!byDay[k]||r.type==='daily')byDay[k]=r;});
  const sd=new Date(from*864e5); let start=from-((sd.getUTCDay()+6)%7);
  const weeks=Math.ceil((to-start+1)/7);
  let cols='';
  for(let w=0;w<weeks;w++){
    let cells='';
    for(let d=0;d<7;d++){
      const day=start+w*7+d;
      if(day>to){cells+='<i></i>';continue;}
      const ds=new Date(day*864e5).toISOString().slice(0,10);
      const r=byDay[ds];
      cells+=r?`<i class="cal-on ${r.type==='weekly'?'cal-w':''}" data-rid="${esc(r.id)}" title="${esc(fmtDate(ds))} · ${esc(r.headline||r.id)}"></i>`
             :`<i title="${esc(fmtDate(ds))}"></i>`;
    }
    cols+=`<div class="cal-col">${cells}</div>`;
  }
  return `<div class="card"><div class="sec-title" style="margin:0 0 4px;font-size:17px">🗓 리포트 캘린더</div>
    <div class="sec-sub">발행 히트맵 — 칸을 누르면 해당 리포트 · <span style="color:var(--gold)">■</span> 데일리 <span style="color:var(--purple)">■</span> 위클리</div>
    <div class="cal-wrap" id="calWrap">${cols}</div></div>`;
}
/* ── 워치리스트 다이제스트 (Koyfin watchlist analytics 벤치마크) ── */
let DIGEST_CACHE=null;
function renderDigest(){
  const host=$('#watchDigest'); if(!host) return;
  if(DIGEST_CACHE!==null){host.innerHTML=DIGEST_CACHE;return;}
  let last=null; try{last=localStorage.getItem('fu-last-seen');}catch(e){}
  const to=(D.build&&D.build.to)||'';
  try{localStorage.setItem('fu-last-seen',to);}catch(e){}
  const L=dnum(last);
  if(L==null||!WL.size||last>=to){DIGEST_CACHE='';host.innerHTML='';return;}
  const items=[];
  WL.forEach(k=>{const i=k.indexOf(':'),kind=k.slice(0,i),name=k.slice(i+1);
    const obj=kind==='stock'?STOCK_BY_NAME[name]:(D.sectors||[]).find(s=>s.theme===name);
    if(!obj)return;
    const fresh=(obj.mentions||[]).filter(m=>{const x=dnum(m.date);return x!=null&&x>L;});
    if(fresh.length)items.push({kind,name,n:fresh.length,m:fresh[fresh.length-1]});});
  if(!items.length){DIGEST_CACHE='';host.innerHTML='';return;}
  items.sort((a,b)=>b.n-a.n);
  DIGEST_CACHE=`<div class="card" style="border-color:var(--gold-border)">
    <div class="sec-title" style="margin:0 0 4px;font-size:17px">🔔 워치리스트 새 소식 <span class="count-badge">${items.length}</span></div>
    <div class="sec-sub">지난 방문(${esc(fmtDate(last))}) 이후 관심 항목의 새 언급</div>
    ${items.map(it=>`<div class="sr-row"><span class="sr-name" ${it.kind==='stock'?`data-stock="${esc(it.name)}"`:`data-go="sectors" data-sector="${esc(it.name)}"`}>${it.kind==='sector'?'🧩 ':''}${esc(it.name)}</span><span class="sr-total">새 언급 ${it.n}건</span><span style="font-size:12px;color:var(--text-3)">${esc(it.m.label||it.m.name||'')} · ${esc(fmtDate(it.m.date))}</span></div>`).join('')}
  </div>`;
  host.innerHTML=DIGEST_CACHE;
}
function drawTrend(){

  miniChart('cKOSPI', S['코스피'], '#dc2626');
  miniChart('cKOSDAQ', S['코스닥'], '#2563eb');

function miniChart(id, data, color){
  const el=document.getElementById(id); if(!el) return;
  if(!window.Chart || !data || data.length<2){
    const wrap=el.closest('.idx-chart');
    const last=(data&&data.length)?data[data.length-1].value.toLocaleString():null;
    if(wrap) wrap.innerHTML=`<div class="empty" style="padding:28px 8px;font-size:12px">데이터 부족<br><span style="font-size:10.5px;color:var(--text-4)">${last?('최근값 '+last):'리포트에 종가 미기재일 多'}</span></div>`;
    return;
  }
  const _cs=getComputedStyle(document.documentElement);
  const _grid=_cs.getPropertyValue('--grid').trim()||'#f0ece5';
  const _tx=_cs.getPropertyValue('--text-3').trim()||'#8a847a';
  const _ch=new Chart(el,{type:'line',
    data:{labels:data.map(p=>fmtDate(p.date)),datasets:[{data:data.map(p=>p.value),borderColor:color,backgroundColor:color+'22',tension:.3,fill:true,pointRadius:2,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{grid:{color:_grid},ticks:{font:{family:'JetBrains Mono',size:9},color:color}},
              x:{grid:{display:false},ticks:{font:{family:'JetBrains Mono',size:9},color:_tx,maxRotation:0,autoSkip:true,maxTicksLimit:5}}}}});
  (window.__charts=window.__charts||[]).push(_ch);
}

let stockSort='count', stockQuery='', stockOnlyWatch=false, stockHotOnly=false, stockSupplyOnly=false;
let stockTheme='', stockWho='', stockMin=0, stockTpOnly=false;
function renderStocks(){
  $('#view-stocks').innerHTML=`
    <div class="sec-title">📈 종목 유니버스 <span class="count-badge">${(D.stocks||[]).length}</span></div>
    <div class="sec-sub">${RECENT_LABEL} · 테마/수급 출처와 시점</div>
    <div class="controls">
      <input id="stockq" type="text" placeholder="종목명 검색…" value="${esc(stockQuery)}">
      <div class="seg" id="stockSort">
        <button data-s="count" class="${stockSort==='count'?'on':''}">언급순</button>
        <button data-s="supply" class="${stockSort==='supply'?'on':''}">수급포착순</button>
        <button data-s="name" class="${stockSort==='name'?'on':''}">이름순</button>
      </div>
    </div>
    <div class="stock-tools">
      <label class="check-chip"><input id="stockWatchOnly" type="checkbox" ${stockOnlyWatch?'checked':''}> 워치만</label>
      <label class="check-chip"><input id="stockHotOnly" type="checkbox" ${stockHotOnly?'checked':''}> 뜨거운 종목</label>
      <label class="check-chip"><input id="stockSupplyOnly" type="checkbox" ${stockSupplyOnly?'checked':''}> 수급 있음</label>
      <select id="stockTheme" class="sel"><option value="">전체 테마</option>${[...new Set((D.stocks||[]).flatMap(s=>s.themes||[]))].sort((a,b)=>a.localeCompare(b,'ko')).map(t=>`<option value="${esc(t)}" ${stockTheme===t?'selected':''}>${esc(t)}</option>`).join('')}</select>
      <select id="stockWho" class="sel"><option value="">전체 수급주체</option>${['외국인','기관','연기금','투신','사모펀드'].map(g=>`<option value="${g}" ${stockWho===g?'selected':''}>${g}</option>`).join('')}</select>
      <select id="stockMin" class="sel"><option value="0">언급 전체</option><option value="3" ${stockMin===3?'selected':''}>3회+</option><option value="5" ${stockMin===5?'selected':''}>5회+</option><option value="10" ${stockMin===10?'selected':''}>10회+</option></select>
      <label class="check-chip"><input id="stockTpOnly" type="checkbox" ${stockTpOnly?'checked':''}> 목표가 있음</label>
      <button class="cmp-add" id="stockReset">필터 초기화</button>
      <span class="stock-meta-line" id="stockResultMeta"></span>
    </div>
    <div id="stockList"></div>`;
  $('#stockq').addEventListener('input',e=>{stockQuery=e.target.value;drawStockList();});
  $('#stockSort').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;stockSort=b.dataset.s;$$('#stockSort button').forEach(x=>x.classList.toggle('on',x===b));drawStockList();});
  $('#stockWatchOnly').addEventListener('change',e=>{stockOnlyWatch=e.target.checked;drawStockList();});
  $('#stockHotOnly').addEventListener('change',e=>{stockHotOnly=e.target.checked;drawStockList();});
  $('#stockSupplyOnly').addEventListener('change',e=>{stockSupplyOnly=e.target.checked;drawStockList();});
  $('#stockTheme').addEventListener('change',e=>{stockTheme=e.target.value;drawStockList();});
  $('#stockWho').addEventListener('change',e=>{stockWho=e.target.value;drawStockList();});
  $('#stockMin').addEventListener('change',e=>{stockMin=+e.target.value;drawStockList();});
  $('#stockTpOnly').addEventListener('change',e=>{stockTpOnly=e.target.checked;drawStockList();});
  $('#stockReset').addEventListener('click',()=>{stockQuery='';stockOnlyWatch=false;stockHotOnly=false;stockSupplyOnly=false;stockSort='count';stockTheme='';stockWho='';stockMin=0;stockTpOnly=false;renderStocks();});
  drawStockList();
}
function drawStockList(){
  let list=(D.stocks||[]).slice();
  const q=stockQuery.trim().toLowerCase();
  if(q) list=list.filter(s=>s.name.toLowerCase().includes(q));
  if(stockOnlyWatch) list=list.filter(s=>isWatched('stock',s.name));
  if(stockHotOnly) list=list.filter(s=>{const m=momentumOf(s); return m && (m.cls==='mo-hot'||m.cls==='mo-warm');});
  if(stockSupplyOnly) list=list.filter(s=>(s.supply_count||0)>0);
  if(stockTheme) list=list.filter(s=>(s.themes||[]).includes(stockTheme));
  if(stockWho) list=list.filter(s=>(s.supply_tags||[]).some(t=>t.includes(stockWho)));
  if(stockMin) list=list.filter(s=>(s.count||0)>=stockMin);
  if(stockTpOnly) list=list.filter(s=>(s.targets||[]).length>0);
  const meta=$('#stockResultMeta'); if(meta) meta.textContent=`${list.length.toLocaleString()} / ${(D.stocks||[]).length.toLocaleString()} 종목`;
  if(stockSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  else if(stockSort==='supply') list.sort((a,b)=>(b.supply_count-a.supply_count)||(b.count-a.count));
  else list.sort((a,b)=>(b.count-a.count)||a.name.localeCompare(b.name,'ko'));
  const host=$('#stockList');
  if(!list.length){host.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}
  host.innerHTML=list.map(stockRow).join('');
  drawStockSparks();
}

}
function chatNewsRow(n){
  return `<div class="mention"><span class="md">${esc(fmtDate(n.date))}</span>
    <span class="src-pill 테마">뉴스</span>
    <span>${esc(n.title)} <a class="src" href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.outlet||'열기')}↗</a></span></div>`;

function renderChat(s){
  const c=s.chat; if(!c) return '';
  const st=c.stance||{};
  const badge=`<span style="color:#7c3aed">강세 ${st.bullish||0} · 약세 ${st.bearish||0} · 관망 ${st.watch||0}</span>`;
  const ops=c.opinions||[], mkt=c.market_news||[], nws=c.news||[];
  const opHtml = ops.slice(0,CHAT_INIT_OP).map((m,i)=>chatMentionRow(s,'opinion',m,i)).join('')
    || '<div style="font-size:11.5px;color:var(--text-4)">개별 의견 없음</div>';
  const opMore = ops.length>CHAT_INIT_OP
    ? `<div class="chat-more" data-chat-stock="${esc(s.name)}" data-chat-kind="opinion" data-chat-shown="${CHAT_INIT_OP}" style="cursor:pointer;color:#16a34a;font-size:11.5px;margin:3px 0">＋ 의견 ${ops.length-CHAT_INIT_OP}건 더보기</div>` : '';
  const mktBlock = mkt.length
    ? `<details class="chat-mkt" style="margin-top:6px"><summary style="cursor:pointer;color:#16a34a;font-size:11.5px">📰 관련 시황 ${mkt.length}건</summary>
        <div class="chat-mkt-body" data-chat-stock="${esc(s.name)}" data-chat-shown="0"></div></details>` : '';
  const nwHtml = nws.slice(0,CHAT_INIT_NEWS).map(chatNewsRow).join('');
  const nwMore = nws.length>CHAT_INIT_NEWS
    ? `<div class="chat-more-news" data-chat-stock="${esc(s.name)}" data-chat-shown="${CHAT_INIT_NEWS}" style="cursor:pointer;color:#16a34a;font-size:11.5px;margin:3px 0">＋ 뉴스 ${nws.length-CHAT_INIT_NEWS}건 더보기</div>` : '';
  return `<div style="margin-top:10px;border-top:1px dashed var(--border);padding-top:8px">
    <div style="font-size:11.5px;font-weight:700;color:#7c3aed;margin-bottom:4px">💬 채팅 근거 · ${c.count}회 · ${badge}</div>
    <div style="font-size:11px;color:var(--text-3);margin-bottom:3px">💡 의견</div>${opHtml}${opMore}
    ${mktBlock}
    ${nws.length?`<div style="font-size:11px;color:var(--text-3);margin:5px 0 3px">📰 뉴스(최신순)</div>${nwHtml}${nwMore}`:''}
  </div>`;
}

  const chatPill = s.chat ? `<span class="pill" style="background:#f5f3ff;color:#7c3aed">\uD83D\uDCAC ${s.chat.count}</span>` : '';

      <button class="cmp-add ${isComparePicked(s.name)?'on':''}" data-cmp="${esc(s.name)}" onclick="event.stopPropagation();toggleCompare('${esc(s.name)}')">${isComparePicked(s.name)?'비교중':'비교'}</button>
      <span class="strow-cnt">${s.count}회</span>

function prinCard(p){
  const max=(D.principles||[])[0]?.count||1;
  const occ=(p.occurrences||[]).slice().reverse().map(o=>`
    <div class="mention"><span class="md">${esc(fmtDate(o.date))}</span>
      <span class="src-pill 테마">${esc(o.source||'')}</span>
      <span>${esc(o.text)} ${srcLink(o.id)}</span></div>`).join('');
  const parts=p.principle.split(' — ');
  return `<div class="pcard">
    <div class="pcard-head" onclick="this.parentNode.querySelector('.pcard-detail').classList.toggle('open')">
      <span class="pcard-ico">${p.icon||'•'}</span>
      <span class="pcard-name">${esc(parts[0])}${parts[1]?`<div style="font-size:12px;color:var(--text-3);font-weight:400;margin-top:2px">${esc(parts[1])}</div>`:''}</span>
      <span class="pcard-meta">${p.count}회<br>~${esc(fmtDate(p.last_seen))}</span>
    </div>
    <div class="pbar"><i style="width:${Math.round(p.count/max*100)}%"></i></div>
    <div class="pcard-detail">${occ}</div>
  </div>`;
}

function scoreItem(it,tokens){
  const hay=(it.title+' '+it.snippet+' '+(it.tags||[]).join(' ')+' '+it.kind).toLowerCase();
  let sc=0;
  for(const t of tokens){ if(!hay.includes(t))return -1; sc += (it.title.toLowerCase().includes(t)?3:1); }
  return sc;
}
function runSearch(){
  const raw=$('#q').value.trim();
  $('#clr').style.display=raw?'block':'none';
  const panel=$('#searchPanel');
  if(!raw){panel.classList.remove('open');panel.innerHTML='';return;}
  const tokens=raw.toLowerCase().split(/\s+/).filter(Boolean);
  let res=SEARCH.map(it=>({it,sc:scoreItem(it,tokens)})).filter(x=>x.sc>=0);
  // 종목명 직접 매칭 보너스
  res.sort((a,b)=> b.sc-a.sc || (b.it.date||'').localeCompare(a.it.date||''));
  const kinds=[...new Set(res.map(x=>x.it.kind))];
  if(searchFilter!=='all') res=res.filter(x=>x.it.kind===searchFilter);
  const top=res.slice(0,50);
  const head=`<div class="sp-head">
     <span class="sp-filter ${searchFilter==='all'?'on':''}" data-f="all">전체 ${res.length>50?'50+':res.length}</span>
     ${kinds.map(k=>`<span class="sp-filter ${searchFilter===k?'on':''}" data-f="${esc(k)}">${esc(k)}</span>`).join('')}</div>`;
  const body= top.length? top.map(x=>{
      const it=x.it;
      return `<button class="sr" ${it.id&&FILE[it.id]?`data-report="${esc(it.id)}" data-q="${esc(it.title||'')}"`:''}>
        <div class="sr-top"><span class="sr-kind">${esc(it.kind)}</span><span class="sr-title">${hl(it.title,tokens)}</span><span class="sr-date">${esc(fmtDate(it.date))}</span></div>
        <div class="sr-snip">${hl(it.snippet,tokens)}</div></button>`;
    }).join('') : '<div class="sr-empty">결과가 없습니다.</div>';
  panel.innerHTML=head+body;
  panel.classList.add('open');
  $('#searchHint').textContent=`“${raw}” — ${res.length}건`;
}
function hl(s,tokens){

  return s;
}

/* ── 모멘텀: 시장 데이터 우선, 없으면 언급 최근성 폴백 ── */
function dnum(d){ if(!d)return null;
  let m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(d);
  if(m)return Math.floor(Date.UTC(+m[1],+m[2]-1,+m[3])/864e5);
  m=/^(\d{4})-W(\d{2})$/.exec(d);
  if(m){const s=new Date(Date.UTC(+m[1],0,1+(+m[2]-1)*7));const dow=s.getUTCDay()||7; s.setUTCDate(s.getUTCDate()+1-dow); return Math.floor(s.getTime()/864e5);}
  return null;}
const TO_DAY=(()=>{const t=dnum((D.build&&D.build.to)||''); return t||Math.floor(Date.now()/864e5);})();
function mentionMomentum(mentions){
  const days=(mentions||[]).map(m=>dnum(m.date)).filter(x=>x!=null);
  if(!days.length)return null;
  const rec=days.filter(x=>x>=TO_DAY-13).length;
  const pri=days.filter(x=>x<TO_DAY-13&&x>=TO_DAY-27).length;
  if(rec>=3&&rec>pri*1.5) return {cls:'mo-hot',txt:'🔥 언급 가열',reason:`최근 14일 ${rec}회 · 직전 14일 ${pri}회`};
  if(rec>=2&&rec>pri)     return {cls:'mo-warm',txt:'↗ 언급 상승',reason:`최근 14일 ${rec}회 · 직전 14일 ${pri}회`};
  if(pri>=2&&rec<=pri*0.5) return {cls:'mo-cool',txt:'❄ 언급 냉각',reason:`최근 14일 ${rec}회 · 직전 14일 ${pri}회`};
  if(rec>=1)              return {cls:'mo-flat',txt:'· 언급 유지',reason:`최근 14일 ${rec}회 · 직전 14일 ${pri}회`};
  return null;
}
function marketMomentum(mm){
  if(!mm||!mm.state)return null;
  const cls={hot:'mo-hot',warm:'mo-warm',cool:'mo-cool',flat:'mo-flat'}[mm.state]||'mo-flat';
  return {cls,txt:mm.label||({hot:'🔥 시장 과열',warm:'↗ 시장 상승',cool:'❄ 시장 냉각',flat:'· 시장 유지'}[mm.state]||'· 시장 유지'),reason:mm.reason||'',score:mm.score};
}
function momentumOf(o){
  if(Array.isArray(o))return mentionMomentum(o);
  const m=marketMomentum(o&&o.market_momentum);
  if(m)return m;
  return mentionMomentum(o&&o.mentions);
}
function momentumChip(o){
  const m=momentumOf(o);
  if(!m)return '';
  const title=esc([m.reason,m.score!=null?`점수 ${m.score}`:''].filter(Boolean).join(' · '));
  return `<span class="mo-chip ${m.cls}" title="${title}">${m.txt}</span>`;
}
const SECMAX=Math.max(1,...((D.sectors||[]).map(s=>s.count||0)));

/* ── 스파크라인(주별 언급 빈도) ── */
function weeklyCounts(mentions){
  const from=dnum((D.build&&D.build.from)||''),to=TO_DAY;
  if(from==null)return [];
  const weeks=Math.max(1,Math.ceil((to-from)/7));
  const arr=new Array(weeks+1).fill(0);
  (mentions||[]).forEach(m=>{const x=dnum(m.date); if(x==null)return; let wi=Math.floor((x-from)/7); if(wi<0)wi=0; if(wi>weeks)wi=weeks; arr[wi]++;});
  return arr;
}
function drawSpark(cv,counts){
  if(!cv||!counts||counts.length<2)return;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,pad=5;
  ctx.clearRect(0,0,W,H);
  const max=Math.max(1,...counts),n=counts.length;
  const gold=getComputedStyle(document.documentElement).getPropertyValue('--gold').trim()||'#b8860b';
  const x=i=>pad+i*(W-2*pad)/(n-1), y=v=>H-pad-(v/max)*(H-2*pad);
  ctx.beginPath();ctx.moveTo(x(0),H-pad);counts.forEach((v,i)=>ctx.lineTo(x(i),y(v)));ctx.lineTo(x(n-1),H-pad);ctx.closePath();
  ctx.fillStyle=gold+'22';ctx.fill();
  ctx.beginPath();counts.forEach((v,i)=>{const px=x(i),py=y(v);i?ctx.lineTo(px,py):ctx.moveTo(px,py);});
  ctx.strokeStyle=gold;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  ctx.beginPath();ctx.arc(x(n-1),y(counts[n-1]),3,0,7);ctx.fillStyle=gold;ctx.fill();
}
const STOCK_BY_NAME={};(D.stocks||[]).forEach(s=>STOCK_BY_NAME[s.name]=s);

const CO_MAP=(()=>{

    for(let i=0;i<names.length;i++)for(let j=0;j<names.length;j++){if(i===j)continue;
      (co[names[i]]=co[names[i]]||{})[names[j]]=(co[names[i]][names[j]]||0)+1;}};
  (D.sectors||[]).forEach(s=>(s.mentions||[]).forEach(m=>add(m.stocks)));
  (D.supply_days||[]).forEach(d=>add(d.stocks));
  const out={};
  Object.keys(co).forEach(n=>{out[n]=Object.entries(co[n]).sort((a,b)=>b[1]-a[1]).slice(0,6);});
  return out;
})();

/* ═══════════ V3: 관계망 그래프 ═══════════ */
const SECTOR_BY_THEME={}; (D.sectors||[]).forEach(s=>SECTOR_BY_THEME[s.theme]=s);
const GPAL=['#dc2626','#2563eb','#16a34a','#7c3aed','#0891b2','#b8860b','#db2777','#ea580c','#0d9488','#4f46e5','#65a30d','#9333ea','#0284c7','#ca8a04','#e11d48','#059669','#a16207','#1d4ed8','#be123c','#15803d','#6d28d9','#0e7490','#c026d3','#0369a1','#b45309','#7e22ce','#047857','#9f1239'];
const GMAJOR_MIN=3;
let G=null, gAlpha=0, gRAF=null, gActive=false, gBuiltFilter=null;
let gView={k:1,tx:0,ty:0}, gHover=null, gDrag=null, gPan=null, gDirty=false;

function gClean(nm){return (''+nm).replace(/\s*[+\-]?\d[\d.,%]*\s*$/,'').trim()||nm;}
function buildGraph(filter){
  const sectors=(D.sectors||[]);
  const nodes=[], idx={}, links=[];
  sectors.forEach((s,i)=>{const id='S:'+s.theme;
    nodes.push({id,kind:'sector',name:s.theme,val:s.count||1,color:GPAL[i%GPAL.length],deg:0,ref:s,
      x:Math.cos(i/sectors.length*6.283)*120,y:Math.sin(i/sectors.length*6.283)*120,vx:0,vy:0});
    idx[id]=nodes.length-1;});
  sectors.forEach((s,i)=>{const col=GPAL[i%GPAL.length], sIdx=idx['S:'+s.theme];
    (s.stocks||[]).forEach(raw=>{const nm=gClean(raw); const st=STOCK_BY_NAME[nm]||STOCK_BY_NAME[raw];
      const cnt=(st&&st.count)||1;
      if(filter==='major' && cnt<GMAJOR_MIN && !(st&&(st.sectors||[]).length>=2)) return; // 주요: 언급 적고 단일섹터면 생략
      const id='K:'+nm;
      if(idx[id]==null){ nodes.push({id,kind:'stock',name:nm,val:cnt,color:col,deg:0,ref:st,
        x:(Math.random()-.5)*260,y:(Math.random()-.5)*260,vx:0,vy:0}); idx[id]=nodes.length-1; }
      links.push({s:sIdx,t:idx[id]}); nodes[sIdx].deg++; nodes[idx[id]].deg++;
    });
  });
  // 고립 섹터 제거 안 함(섹터는 항상 표시). 연결 0인 stock은 생기지 않음.
  return {nodes,links,idx};
}
function gRadius(n){return n.kind==='sector' ? 7+Math.sqrt(n.val)*2.4 : 3+Math.sqrt(n.val)*1.5;}
function gTick(){
  const N=G.nodes, L=G.links, n=N.length;
  const REP=1500, SPRING=0.025, SLEN=64, GRAV=0.018, DAMP=0.84;
  // 척력 (O(n^2), ~수백 노드 OK)
  for(let i=0;i<n;i++){const a=N[i];
    for(let j=i+1;j<n;j++){const b=N[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||0.01; if(d2>90000)continue;
      const f=REP/d2*gAlpha; const d=Math.sqrt(d2); const fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }}
  // 인력(스프링)
  for(const e of L){const a=N[e.s], b=N[e.t];
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
    const f=(d-SLEN)*SPRING*gAlpha; const fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
  }
  // 중심 중력 + 적분
  for(const p of N){
    p.vx-=p.x*GRAV*gAlpha; p.vy-=p.y*GRAV*gAlpha;
    if(p===gDrag){p.x=p.fx; p.y=p.fy; p.vx=0; p.vy=0; continue;}
    p.vx*=DAMP; p.vy*=DAMP;
    p.vx=Math.max(-12,Math.min(12,p.vx)); p.vy=Math.max(-12,Math.min(12,p.vy));
    p.x+=p.vx; p.y+=p.vy;
  }
  if(gAlpha>0.02) gAlpha*=0.992;
}
function gFit(){
  const cv=$('#graphCanvas'); if(!cv)return; const W=cv.clientWidth,H=cv.clientHeight;
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  for(const p of G.nodes){minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);}
  const gw=maxX-minX||1, gh=maxY-minY||1; const k=Math.min(W/(gw+120),H/(gh+120),1.6);
  gView.k=k; gView.tx=W/2-(minX+maxX)/2*k; gView.ty=H/2-(minY+maxY)/2*k;
}
function gNeighbors(node){const set=new Set();
  for(const e of G.links){ if(G.nodes[e.s]===node)set.add(G.nodes[e.t]); if(G.nodes[e.t]===node)set.add(G.nodes[e.s]); }
  return set;}
function gDraw(){
  const cv=$('#graphCanvas'); if(!cv)return; const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,dpr=window.devicePixelRatio||1;
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
  ctx.setTransform(gView.k*dpr,0,0,gView.k*dpr,gView.tx*dpr,gView.ty*dpr);
  const cs=getComputedStyle(document.documentElement);
  const lineC=cs.getPropertyValue('--border').trim()||'#e4dfd6';
  const txC=cs.getPropertyValue('--text-2').trim()||'#4a4540';
  const bg=cs.getPropertyValue('--surface').trim()||'#fff';
  const nb = gHover?gNeighbors(gHover):null;
  // links
  for(const e of G.links){const a=G.nodes[e.s], b=G.nodes[e.t];
    const hot = gHover && (a===gHover||b===gHover);
    ctx.strokeStyle = hot ? (a.kind==='sector'?a.color:b.color) : lineC;
    ctx.globalAlpha = gHover ? (hot?0.85:0.12) : 0.5;
    ctx.lineWidth = (hot?1.6:0.7)/gView.k;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  ctx.globalAlpha=1;
  // nodes
  for(const p of G.nodes){const r=gRadius(p);
    const dim = gHover && p!==gHover && !(nb&&nb.has(p));
    ctx.globalAlpha = dim?0.22:1;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,6.2832);
    ctx.fillStyle=p.color||'#9a8f7d'; ctx.fill();
    ctx.lineWidth=1.4/gView.k; ctx.strokeStyle=bg; ctx.stroke();
    if(p===gHover){ctx.lineWidth=2.4/gView.k; ctx.strokeStyle=p.color; ctx.stroke();}
  }
  // labels: 섹터 항상, 종목은 hover/이웃/확대 시
  ctx.globalAlpha=1; ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillStyle=txC;
  for(const p of G.nodes){const r=gRadius(p);
    const showLbl = p.kind==='sector' || p===gHover || (nb&&nb.has(p)) || gView.k>1.25;
    if(!showLbl) continue;
    if(gHover && p!==gHover && !(nb&&nb.has(p))) continue;
    ctx.font=`${(p.kind==='sector'?12:10)}px 'Noto Sans KR',sans-serif`;
    ctx.fillStyle = p.kind==='sector'?txC:cs.getPropertyValue('--text-3').trim();
    ctx.fillText(p.name, p.x, p.y+r+2);
  }
  ctx.setTransform(1,0,0,1,0,0);
}
function gLoop(){ if(!gActive)return; if(gAlpha>0.02){gTick(); gDraw();} else if(gDirty){gDraw(); gDirty=false;} gRAF=requestAnimationFrame(gLoop); }
function gSizeCanvas(){const cv=$('#graphCanvas'); if(!cv)return; const dpr=window.devicePixelRatio||1;
  cv.width=cv.clientWidth*dpr; cv.height=cv.clientHeight*dpr; }
function gScreenToWorld(mx,my){return {x:(mx-gView.tx)/gView.k, y:(my-gView.ty)/gView.k};}
function gPick(mx,my){const w=gScreenToWorld(mx,my); let best=null,bd=1e9;
  for(const p of G.nodes){const r=gRadius(p)+4/gView.k; const dx=p.x-w.x,dy=p.y-w.y,d=dx*dx+dy*dy;
    if(d<r*r && d<bd){bd=d;best=p;}} return best;}
function gNavigate(p){
  if(p.kind==='stock'){ showTab('stocks'); stockQuery=p.name; stockSort='count';
    if($('#stockq'))$('#stockq').value=p.name; renderStocks();
    const f=$('#stockList .strow-detail'); if(f)f.classList.add('open');
  } else { showTab('sectors');
    const card=$$('#view-sectors .scard').find(c=>c.querySelector('.scard-name')?.textContent===p.name);
    if(card){card.querySelector('.scard-detail').classList.add('open'); setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'center'}),60);} }
}
function gWireCanvas(){
  const cv=$('#graphCanvas'); if(!cv||cv.__wired)return; cv.__wired=true;
  const tip=$('#graphTip');
  cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top; gDirty=true;
    if(gDrag){const w=gScreenToWorld(mx,my); gDrag.fx=w.x; gDrag.fy=w.y; gAlpha=Math.max(gAlpha,0.3); return;}
    if(gPan){gView.tx+=e.clientX-gPan.x; gView.ty+=e.clientY-gPan.y; gPan={x:e.clientX,y:e.clientY}; return;}
    const hit=gPick(mx,my); gHover=hit;
    if(hit){cv.style.cursor='pointer'; const c=hit.ref&&hit.ref.count!=null?hit.ref.count:hit.val;
      tip.innerHTML=`<div class="gt-name">${esc(hit.name)}</div><div class="gt-meta">${hit.kind==='sector'?'섹터':'종목'} · ${c}회 · 연결 ${hit.deg}</div>`;
      tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px'; tip.classList.add('on');
    } else {cv.style.cursor='grab'; tip.classList.remove('on');}
  });
  cv.addEventListener('mousedown',e=>{const r=cv.getBoundingClientRect(); const hit=gPick(e.clientX-r.left,e.clientY-r.top);
    if(hit){gDrag=hit; const w=gScreenToWorld(e.clientX-r.left,e.clientY-r.top); gDrag.fx=w.x; gDrag.fy=w.y; gDrag.__moved=false;}
    else gPan={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',e=>{ if(gDrag){gDrag=null;} gPan=null; });
  cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect(); const hit=gPick(e.clientX-r.left,e.clientY-r.top); if(hit)gNavigate(hit);});
  cv.addEventListener('wheel',e=>{e.preventDefault(); const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top;
    const f=e.deltaY<0?1.12:0.89; const nk=Math.max(0.3,Math.min(3.2,gView.k*f));
    gView.tx=mx-(mx-gView.tx)*(nk/gView.k); gView.ty=my-(my-gView.ty)*(nk/gView.k); gView.k=nk; gDirty=true;},{passive:false});
  cv.addEventListener('mouseleave',()=>{tip.classList.remove('on'); gHover=null; gDirty=true;});
}

function rmKindLabel(id){const r=REPORT_BY_ID[id]; if(!r)return '원문 리포트';
  return r.type==='weekly'?'주간 리포트':'데일리 리포트';}
function deriveQuery(el){
  const pick=(sel,c)=>{const n=c&&c.querySelector(sel);return n?n.textContent.trim():'';};
  let c;
  if(c=el.closest('.strow')) return pick('.strow-name',c);
