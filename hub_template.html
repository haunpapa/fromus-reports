<!DOCTYPE html>
<!--
  프롬어스 Knowledge Hub — 자동 생성 파일 (build_hub.py 로 빌드)
  데이터는 아래 kb-data 스크립트의 마커 사이에 주입됩니다. 직접 편집하지 마세요.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>프롬어스 Knowledge Hub</title>
<script>
  // 테마 조기 적용 (페인트 전 — 깜빡임 방지)
  (function(){try{var t=localStorage.getItem('fu-theme');
    if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
    document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,700;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  color-scheme: light dark;
  --bg:#faf8f5; --white:#fff; --surface:#fff; --surface-2:#f5f2ed; --surface-3:#eeebe5;
  --border:#e4dfd6; --border-light:#f0ece5;
  --gold:#b8860b; --gold-bg:#fef9ec; --gold-border:#f5e6b8;
  --blue:#2563eb; --blue-bg:#eff6ff; --red:#dc2626; --red-bg:#fef2f2;
  --green:#16a34a; --green-bg:#f0fdf4; --purple:#7c3aed; --purple-bg:#f5f3ff;
  --cyan:#0891b2; --cyan-bg:#ecfeff;
  --text:#1a1612; --text-2:#4a4540; --text-3:#8a847a; --text-4:#b0a898;
  --topbar-bg:rgba(250,248,245,.92); --shadow:rgba(0,0,0,.04); --grid:#f0ece5;
}
:root[data-theme="dark"]{
  color-scheme: dark;
  --bg:#14110d; --white:#1f1b15; --surface:#1f1b15; --surface-2:#2a251d; --surface-3:#352f24;
  --border:#3a3429; --border-light:#2a251d;
  --gold:#e0b04a; --gold-bg:#2e2616; --gold-border:#4a3c1c;
  --blue:#60a5fa; --blue-bg:#1a2438; --red:#f87171; --red-bg:#3a1f1f;
  --green:#4ade80; --green-bg:#16291c; --purple:#a78bfa; --purple-bg:#241a38;
  --cyan:#22d3ee; --cyan-bg:#15303a;
  --text:#f0ebe2; --text-2:#c4bdb0; --text-3:#938b7d; --text-4:#6e675b;
  --topbar-bg:rgba(20,17,13,.9); --shadow:rgba(0,0,0,.35); --grid:#2a251d;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
.mono{font-family:'JetBrains Mono',monospace;}
.serif{font-family:'Playfair Display',serif;}
a{color:inherit;}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:50;background:var(--topbar-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
.topbar-inner{max-width:1080px;margin:0 auto;padding:14px 20px 0;}
.brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.brand .logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);}
.brand .sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-3);}
.brand .meta{margin-left:auto;font-size:11.5px;color:var(--text-3);font-family:'JetBrains Mono',monospace;}
.tabs{display:flex;gap:4px;margin-top:12px;overflow-x:auto;}
.tab{padding:10px 16px;font-size:14px;font-weight:600;color:var(--text-3);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ── SEARCH ── */
.searchwrap{max-width:1080px;margin:0 auto;padding:14px 20px 0;position:relative;}
.searchbox{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:.15s;}
.searchbox:focus-within{border-color:var(--gold);box-shadow:0 4px 16px rgba(184,134,11,.12);}
.searchbox input{flex:1;border:none;outline:none;font-size:15px;background:none;color:var(--text);font-family:inherit;}
.searchbox .ico{font-size:17px;color:var(--text-3);}
.searchbox .clr{cursor:pointer;color:var(--text-3);font-size:18px;border:none;background:none;display:none;}
.search-hint{font-size:11.5px;color:var(--text-4);margin:8px 2px 0;}
.search-panel{display:none;position:absolute;left:20px;right:20px;top:100%;margin-top:8px;background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.16);max-height:70vh;overflow:auto;z-index:60;padding:8px;}
.search-panel.open{display:block;}
.sp-head{display:flex;gap:6px;flex-wrap:wrap;padding:8px 8px 10px;border-bottom:1px solid var(--border-light);margin-bottom:6px;}
.sp-filter{font-size:11.5px;padding:4px 10px;border-radius:100px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);cursor:pointer;}
.sp-filter.on{background:var(--gold);color:#fff;border-color:var(--gold);}
.sr{display:block;width:100%;text-align:left;padding:10px 12px;border-radius:10px;border:none;background:none;cursor:pointer;border-bottom:1px solid var(--border-light);}
.sr:hover{background:var(--surface-2);}
.sr:last-child{border-bottom:none;}
.sr-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.sr-kind{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:var(--gold-bg);color:var(--gold);letter-spacing:.5px;flex-shrink:0;}
.sr-title{font-size:14px;font-weight:600;color:var(--text);}
.sr-date{margin-left:auto;font-size:11px;color:var(--text-4);font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.sr-snip{font-size:12.5px;color:var(--text-3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sr-empty{padding:24px;text-align:center;color:var(--text-3);font-size:14px;}
mark{background:var(--gold-bg);color:var(--gold);padding:0 2px;border-radius:3px;}

/* ── LAYOUT ── */
.page{max-width:1080px;margin:0 auto;padding:24px 20px 60px;}
.view{display:none;animation:fade .35s ease both;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.sec-title{font-size:20px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;margin:34px 0 4px;}
.sec-title:first-child{margin-top:0;}
.sec-sub{font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:18px;}
.count-badge{font-size:12px;font-weight:700;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:100px;padding:2px 10px;font-family:'JetBrains Mono',monospace;}

/* ── HOME ── */
.hero{text-align:center;padding:38px 20px 30px;background:linear-gradient(180deg,#fdfcfa,#f8f4ee);border:1px solid var(--border);border-radius:22px;position:relative;overflow:hidden;margin-bottom:24px;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 360px at 30% 20%,rgba(184,134,11,.08),transparent),radial-gradient(ellipse 500px 400px at 80% 80%,rgba(37,99,235,.04),transparent);}
.hero-content{position:relative;z-index:1;}
.hero .label{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:600;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(30px,5.5vw,46px);font-weight:700;margin:16px 0 12px;line-height:1.15;}
.hero h1 em{font-style:italic;color:var(--gold);}
.hero p{font-size:14.5px;color:var(--text-2);max-width:560px;margin:0 auto;}
.statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:24px 0;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat .v{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;color:var(--gold);}
.stat .l{font-size:11px;color:var(--text-3);margin-top:4px;letter-spacing:.5px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.03);margin-bottom:16px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:760px){.grid2{grid-template-columns:1fr;}}
.chart-wrap{position:relative;height:300px;}
.chart-legend{display:flex;gap:18px;justify-content:center;margin-top:12px;font-size:12px;color:var(--text-2);flex-wrap:wrap;}
.chart-legend i{display:inline-block;width:12px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle;}
.now-strat{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:14px;padding:18px 20px;}
.now-strat .q{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold);font-size:17px;line-height:1.5;}
.now-strat cite{display:block;margin-top:8px;font-size:12px;color:var(--text-3);font-style:normal;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;background:var(--surface-2);border:1px solid var(--border);font-size:12.5px;color:var(--text-2);cursor:pointer;transition:.13s;margin:3px 3px 0 0;}
.chip:hover{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold);}
.chip .n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);font-weight:600;}
/* 코어 섹터 (지금 살아있는 전략 내) */
.core-head{font-size:12.5px;color:var(--text-3);font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:6px;}
.core-sec{border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;background:var(--surface);}
.core-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.core-rank{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);font-weight:700;opacity:.55;}
.core-name{font-size:14.5px;font-weight:700;flex:1;}
.core-why{font-size:12.5px;color:var(--text-2);line-height:1.65;}
.core-why .lbl{color:var(--gold);font-weight:700;}
.core-meta{margin-top:7px;font-size:11px;color:var(--text-4);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.core-chip{font-size:10.5px;padding:2px 7px;border-radius:100px;background:var(--surface-2);color:var(--text-3);font-family:'JetBrains Mono',monospace;cursor:pointer;}
.rep-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border);}
.core-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:10px;}
/* 지수 3분할 차트 */
.idx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:10px;}
.idx-h{font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:6px;}
.idx-h i{display:inline-block;width:11px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle;}
.idx-chart{position:relative;height:180px;}

/* ── SECTOR CARDS ── */
.cluster{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.scard-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;}
.scard-rank{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);opacity:.45;font-weight:700;width:30px;}
.scard-name{font-size:16px;font-weight:700;flex:1;}
.scard-stocks{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;}
.tag{padding:3px 9px;border-radius:100px;background:var(--surface-2);font-size:11.5px;color:var(--text-2);font-family:'JetBrains Mono',monospace;cursor:pointer;}
.tag:hover{background:var(--gold-bg);color:var(--gold);}
.scard-detail{display:none;margin-top:12px;border-top:1px dashed var(--border);padding-top:12px;}
.scard-detail.open{display:block;}
.mini-tl{font-size:12.5px;color:var(--text-2);line-height:1.7;}
.mini-tl .d{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);font-weight:600;}
.mini-tl .row{padding:8px 0;border-bottom:1px solid var(--border-light);}
.mini-tl .row:last-child{border-bottom:none;}
.toggle{font-size:11.5px;color:var(--gold);cursor:pointer;user-select:none;font-weight:600;}

/* ── STOCK LIST ── */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.controls input{flex:1;min-width:180px;border:1.5px solid var(--border);border-radius:10px;padding:9px 13px;font-size:14px;font-family:inherit;outline:none;}
.controls input:focus{border-color:var(--gold);}
.seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.seg button{padding:8px 13px;font-size:12.5px;border:none;background:var(--white);color:var(--text-2);cursor:pointer;font-family:inherit;}
.seg button.on{background:var(--gold);color:#fff;}
.strow{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;}
.strow-head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;}
.strow-head:hover{background:var(--surface-2);}
.strow-name{font-size:15px;font-weight:700;min-width:120px;}
.strow-mini{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.pill{font-size:10.5px;padding:2px 8px;border-radius:100px;font-weight:600;}
.pill.theme{background:var(--blue-bg);color:var(--blue);}
.pill.supply{background:var(--green-bg);color:var(--green);}
.pill.tp{background:var(--gold-bg);color:var(--gold);font-family:'JetBrains Mono',monospace;}
.strow-cnt{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);font-weight:600;flex-shrink:0;}
.strow-detail{display:none;padding:0 16px 14px;border-top:1px dashed var(--border);}
.strow-detail.open{display:block;}
.mention{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:12.5px;align-items:flex-start;}
.mention:last-child{border-bottom:none;}
.mention .md{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);font-weight:600;flex-shrink:0;width:62px;}
.src-pill{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:100px;flex-shrink:0;}
.src-pill.테마{background:var(--blue-bg);color:var(--blue);}
.src-pill.수급{background:var(--green-bg);color:var(--green);}
.src{font-size:11px;color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold);margin-left:6px;white-space:nowrap;}

/* ── STRATEGY ── */
.stl{position:relative;padding-left:30px;}
.stl::before{content:'';position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--blue),var(--gold),var(--red));border-radius:1px;}
.stl-item{position:relative;padding:0 0 22px 22px;}
.stl-dot{position:absolute;left:-23px;top:5px;width:16px;height:16px;border-radius:50%;border:3px solid var(--gold);background:var(--bg);}
.stl-dot.w{border-color:var(--purple);}
.stl-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);font-weight:600;}
.stl-head{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin:2px 0 8px;}
.stl-quote{background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:12px 16px;font-size:13.5px;color:var(--text-2);font-style:italic;line-height:1.7;margin-bottom:8px;}
.stl-points{display:flex;flex-wrap:wrap;gap:6px;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.pcard-head{display:flex;align-items:center;gap:12px;cursor:pointer;}
.pcard-ico{font-size:24px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);border-radius:12px;flex-shrink:0;}
.pcard-name{font-size:15.5px;font-weight:700;flex:1;line-height:1.4;}
.pcard-meta{font-size:11px;color:var(--text-3);font-family:'JetBrains Mono',monospace;text-align:right;flex-shrink:0;}
.pbar{height:5px;background:var(--surface-3);border-radius:3px;margin-top:10px;overflow:hidden;}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#d4a84b);border-radius:3px;}
.pcard-detail{display:none;margin-top:14px;border-top:1px dashed var(--border);padding-top:12px;}
.pcard-detail.open{display:block;}

/* ── GLOSSARY ── */
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.gtag{display:inline-block;font-size:11px;font-weight:700;padding:3px 11px;border-radius:100px;background:var(--purple-bg);color:var(--purple);margin-bottom:10px;}
.gterm{font-size:16px;font-weight:700;margin-bottom:8px;}
.gbody{font-size:13.5px;color:var(--text-2);line-height:1.8;}
.gdate{font-size:11px;color:var(--text-4);font-family:'JetBrains Mono',monospace;margin-top:8px;}

/* ── FOOTER ── */
.foot{text-align:center;padding:40px 20px 60px;font-size:12px;color:var(--text-3);border-top:1px solid var(--border);margin-top:40px;}
.foot .logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);margin-bottom:6px;}
.empty{text-align:center;color:var(--text-3);padding:40px;font-size:14px;}

/* ═══════════ V2 개선 컴포넌트 ═══════════ */
/* 테마 토글 */
.theme-btn{margin-left:10px;width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);cursor:pointer;font-size:15px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;}
.theme-btn:hover{border-color:var(--gold);color:var(--gold);}
/* 탭 가로스크롤 페이드(모바일) */
.tabswrap{position:relative;}
.tabswrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:34px;background:linear-gradient(90deg,transparent,var(--topbar-bg));pointer-events:none;opacity:0;transition:.2s;}
.tabswrap.more::after{opacity:1;}
.tabs{scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
/* 클릭 가능한 통계 */
.stat{cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;border:1px solid var(--border);font:inherit;color:inherit;text-align:center;width:100%;}
.stat:hover{transform:translateY(-2px);border-color:var(--gold-border);box-shadow:0 6px 18px var(--shadow);}
.stat .l{display:flex;align-items:center;justify-content:center;gap:3px;}
.stat .go{opacity:0;color:var(--gold);transition:.12s;}
.stat:hover .go{opacity:1;}
/* 오늘의 브리핑 히어로 */
.briefing{background:linear-gradient(135deg,#fdfcfa,#f8f4ee);border:1px solid var(--border);border-radius:22px;padding:30px 30px 26px;position:relative;overflow:hidden;margin-bottom:18px;}
:root[data-theme="dark"] .briefing{background:linear-gradient(135deg,#231d14,#1b1710);}
.briefing::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 520px 320px at 88% 0%,rgba(184,134,11,.10),transparent);}
.brf-in{position:relative;z-index:1;}
.brf-tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;}
.brf-tag .live{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(22,163,74,.5);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.45);}70%{box-shadow:0 0 0 7px rgba(22,163,74,0);}100%{box-shadow:0 0 0 0 rgba(22,163,74,0);}}
.brf-date{margin-left:8px;color:var(--text-3);letter-spacing:0;text-transform:none;font-family:'JetBrains Mono',monospace;font-size:11px;}
.brf-h{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,34px);font-weight:700;line-height:1.18;margin:12px 0 6px;}
.brf-sub{font-size:13px;color:var(--text-2);max-width:680px;line-height:1.65;}
.brf-quote{margin-top:16px;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:14px 18px;font-family:'Playfair Display',serif;font-style:italic;font-size:16px;color:var(--text);line-height:1.55;}
.brf-quote cite{display:block;margin-top:8px;font-family:'Noto Sans KR';font-style:normal;font-size:12px;color:var(--text-3);}
.brf-points{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
@media(max-width:680px){.brf-points{grid-template-columns:1fr;}.briefing{padding:24px 20px;}}
.brf-pt{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--text-2);line-height:1.55;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;}
.brf-pt .k{flex-shrink:0;width:20px;height:20px;border-radius:6px;background:var(--gold-bg);color:var(--gold);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
/* 이벤트 스트립 */
.evscroll{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:none;}
.evscroll::-webkit-scrollbar{display:none;}
.evcard{flex:0 0 auto;width:248px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:12px;padding:13px 15px;}
.evcard .ed{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--cyan);font-weight:600;}
.evcard .et{font-size:13px;font-weight:700;margin:5px 0 4px;line-height:1.4;}
.evcard .ex{font-size:11.5px;color:var(--text-3);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
/* 종목 모멘텀 + 스파크라인 + 즐겨찾기 */
.strow-spark{width:78px;height:26px;flex-shrink:0;}
.mo-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;flex-shrink:0;display:inline-flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;}
.mo-hot{background:var(--red-bg);color:var(--red);}
.mo-warm{background:var(--gold-bg);color:var(--gold);}
.mo-cool{background:var(--blue-bg);color:var(--blue);}
.mo-flat{background:var(--surface-2);color:var(--text-3);}
.star{flex-shrink:0;border:none;background:none;cursor:pointer;font-size:16px;line-height:1;color:var(--text-4);transition:.12s;padding:2px;}
.star:hover{transform:scale(1.2);}
.star.on{color:var(--gold);}
/* 섹터 강도 바 */
.intensity{height:5px;background:var(--surface-3);border-radius:3px;margin:10px 0 4px;overflow:hidden;}
.intensity i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#d4a84b);border-radius:3px;}
.scard-trend{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-left:auto;}
/* 워치리스트 */
.watch-empty{font-size:12.5px;color:var(--text-4);padding:6px 2px;}

/* ═══════════ V3: 관계망 그래프 + 호버 팝오버 ═══════════ */
/* 그래프 */
.graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:0;position:relative;overflow:hidden;box-shadow:0 2px 8px var(--shadow);}
.graph-canvas{display:block;width:100%;height:540px;cursor:grab;touch-action:none;}
.graph-canvas:active{cursor:grabbing;}
.graph-controls{position:absolute;top:12px;left:12px;display:flex;gap:6px;flex-wrap:wrap;z-index:3;}
.graph-controls .seg{background:var(--topbar-bg);backdrop-filter:blur(8px);box-shadow:0 1px 4px var(--shadow);}
.graph-legend{position:absolute;bottom:12px;left:12px;display:flex;gap:10px;flex-wrap:wrap;max-width:70%;z-index:3;background:var(--topbar-bg);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:10px;padding:8px 10px;}
.glg{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);}
.glg i{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.graph-hint{position:absolute;top:12px;right:12px;font-size:11px;color:var(--text-3);background:var(--topbar-bg);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:5px 9px;z-index:3;}
.graph-tip{position:fixed;z-index:80;pointer-events:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px var(--shadow);padding:9px 12px;font-size:12px;max-width:230px;opacity:0;transition:opacity .1s;}
.graph-tip.on{opacity:1;}
.graph-tip .gt-name{font-weight:700;font-size:13px;margin-bottom:2px;}
.graph-tip .gt-meta{font-size:11px;color:var(--text-3);font-family:'JetBrains Mono',monospace;}

/* 호버 팝오버 미리보기(Quartz link preview) */
#popover{position:fixed;z-index:90;width:300px;max-width:86vw;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 14px 44px var(--shadow);padding:14px 16px;opacity:0;transform:translateY(4px);transition:opacity .14s,transform .14s;pointer-events:none;}
#popover.on{opacity:1;transform:translateY(0);}
.pv-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.pv-kind{font-size:9.5px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:100px;background:var(--gold-bg);color:var(--gold);flex-shrink:0;}
.pv-name{font-size:15px;font-weight:700;}
.pv-cnt{margin-left:auto;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--gold);font-weight:600;flex-shrink:0;}
.pv-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.pv-note{font-size:12px;color:var(--text-2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;border-top:1px dashed var(--border);padding-top:8px;}
.pv-note .pvd{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--gold);font-weight:600;}
.pv-foot{margin-top:8px;font-size:10.5px;color:var(--text-4);font-family:'JetBrains Mono',monospace;}
.pv-spark{width:100%;height:34px;display:block;margin:2px 0 8px;}

/* ═══════════ V3.1: 원문 리포트 모달 뷰어 ═══════════ */
.rmodal{position:fixed;inset:0;z-index:120;display:none;}
.rmodal.open{display:block;}
.rmodal-bd{position:absolute;inset:0;background:rgba(20,17,13,.55);backdrop-filter:blur(3px);opacity:0;transition:opacity .2s;}
.rmodal.open .rmodal-bd{opacity:1;}
.rmodal-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-46%);width:min(980px,94vw);height:88vh;background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden;opacity:0;transition:opacity .2s,transform .2s;}
.rmodal.open .rmodal-box{opacity:1;transform:translate(-50%,-50%);}
.rmodal-head{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface-2);}
.rmodal-kind{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:100px;background:var(--gold-bg);color:var(--gold);flex-shrink:0;}
.rmodal-title{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.rmodal-title .rm-date{color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;margin-left:8px;}
.rmodal-jump{font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:8px;padding:4px 9px;flex-shrink:0;display:none;align-items:center;gap:4px;}
.rmodal-jump.show{display:inline-flex;}
.rmodal-open{font-size:12px;color:var(--text-3);text-decoration:none;flex-shrink:0;border:1px solid var(--border);border-radius:8px;padding:5px 10px;transition:.15s;}
.rmodal-open:hover{border-color:var(--gold);color:var(--gold);}
.rmodal-close{flex-shrink:0;width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;font-size:15px;line-height:1;transition:.15s;}
.rmodal-close:hover{border-color:var(--red);color:var(--red);}
.rmodal-body{flex:1;position:relative;background:#fff;}
.rmodal-frame{width:100%;height:100%;border:0;display:block;}
.rmodal-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:13px;background:var(--surface);z-index:1;}
.rmodal-load.hide{display:none;}
@media(max-width:640px){.rmodal-box{width:100vw;height:100vh;height:100dvh;border-radius:0;top:0;left:0;transform:none;}.rmodal.open .rmodal-box{transform:none;}.rmodal-open{display:none;}}

/* ═══════════ V4: Executive UX / 비교·탐색 고도화 ═══════════ */
:root{--focus:0 0 0 3px rgba(184,134,11,.22);--glass:rgba(255,255,255,.72);}
:root[data-theme="dark"]{--glass:rgba(31,27,21,.72);}
button,input,a{ -webkit-tap-highlight-color:transparent; }
button:focus-visible,input:focus-visible,a:focus-visible,.chip:focus-visible{outline:none;box-shadow:var(--focus);}
.topbar{box-shadow:0 1px 0 var(--border),0 10px 30px rgba(0,0,0,.03);}
.searchbox{min-height:48px;}
.searchbox::after{content:'Ctrl K';font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-4);border:1px solid var(--border);border-radius:7px;padding:2px 6px;background:var(--surface-2);}
@media(max-width:640px){.searchbox::after{content:'/';}.brand .meta{width:100%;margin-left:0}.topbar-inner{padding-top:10px}.tabs .tab{padding:9px 12px;font-size:13px}}

.pulse-grid{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:12px;margin:0 0 16px;}
.pulse-card{background:linear-gradient(180deg,var(--surface),var(--surface-2));border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:0 2px 10px var(--shadow);min-width:0;}
.pulse-card.primary{background:linear-gradient(135deg,var(--gold-bg),var(--surface));border-color:var(--gold-border);}
.pulse-k{font-size:11px;color:var(--text-3);letter-spacing:1.1px;text-transform:uppercase;font-weight:800;margin-bottom:8px;}
.pulse-h{font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1.35;margin-bottom:7px;}
.pulse-desc{font-size:12.5px;color:var(--text-2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.pulse-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.pulse-metric{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);font-weight:800;background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:99px;padding:3px 8px;}
.pulse-mini{font-size:11px;color:var(--text-4);}
@media(max-width:900px){.pulse-grid{grid-template-columns:1fr;}.pulse-card{padding:16px}}

.stock-tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:-6px 0 14px;}
.check-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);border-radius:100px;padding:6px 11px;font-size:12px;color:var(--text-2);cursor:pointer;user-select:none;transition:.13s;}
.check-chip:hover{border-color:var(--gold-border);color:var(--gold);}
.check-chip input{accent-color:var(--gold);}
.stock-meta-line{font-size:11.5px;color:var(--text-3);margin-left:auto;font-family:'JetBrains Mono',monospace;}
.cmp-add{border:1px solid var(--border);border-radius:9px;background:var(--surface-2);color:var(--text-2);font-size:11px;font-weight:700;padding:5px 8px;cursor:pointer;white-space:nowrap;transition:.13s;}
.cmp-add:hover,.cmp-add.on{border-color:var(--gold-border);background:var(--gold-bg);color:var(--gold);}
@media(max-width:760px){.strow-head{align-items:flex-start;flex-wrap:wrap}.strow-name{min-width:88px}.strow-spark{order:5;width:100%;height:30px}.stock-meta-line{margin-left:0;width:100%;}}

.cmp-tray{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(120%);z-index:95;display:flex;align-items:center;gap:10px;max-width:min(860px,calc(100vw - 24px));background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);box-shadow:0 14px 44px rgba(0,0,0,.18);border-radius:18px;padding:10px 12px;transition:transform .24s ease;}
.cmp-tray.on{transform:translateX(-50%) translateY(0);}
.cmp-title{font-size:12px;font-weight:800;color:var(--text-2);white-space:nowrap;}
.cmp-items{display:flex;gap:6px;flex-wrap:wrap;min-width:0;}
.cmp-pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:5px 8px;font-size:11.5px;color:var(--text-2);}
.cmp-pill button{border:none;background:none;color:var(--text-4);cursor:pointer;font-size:12px;line-height:1;}
.cmp-act{border:1px solid var(--gold-border);background:var(--gold);color:#fff;border-radius:10px;padding:7px 11px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
.cmp-clear{border:1px solid var(--border);background:var(--surface);color:var(--text-3);border-radius:10px;padding:7px 9px;font-size:12px;cursor:pointer;}
.cmp-modal{position:fixed;inset:0;z-index:130;display:none;}
.cmp-modal.open{display:block;}
.cmp-back{position:absolute;inset:0;background:rgba(20,17,13,.55);backdrop-filter:blur(3px);}
.cmp-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(1020px,94vw);max-height:88vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.42);}
.cmp-head{position:sticky;top:0;z-index:1;background:var(--surface-2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:14px 16px;}
.cmp-head h3{font-size:16px;margin:0;flex:1;}
.cmp-close{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;}
.cmp-body{padding:16px;}
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.cmp-card{border:1px solid var(--border);border-radius:16px;padding:15px;background:var(--surface);}
.cmp-name{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;margin-bottom:8px;}
.cmp-spark{width:100%;height:44px;display:block;margin:4px 0 10px;background:var(--surface-2);border-radius:10px;}
.cmp-kv{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:9px 0;}
.cmp-kv div{background:var(--surface-2);border:1px solid var(--border-light);border-radius:10px;padding:8px;}
.cmp-kv b{display:block;font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:15px;}
.cmp-kv span{font-size:10.5px;color:var(--text-3);}
.cmp-note{font-size:12px;color:var(--text-2);line-height:1.6;border-top:1px dashed var(--border);padding-top:9px;margin-top:9px;}
.cmp-themes{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
@media(max-width:640px){.cmp-tray{left:10px;right:10px;transform:translateY(120%);max-width:none;justify-content:space-between}.cmp-tray.on{transform:translateY(0)}.cmp-title{display:none}.cmp-box{width:100vw;height:100vh;max-height:100vh;border-radius:0}.cmp-head{padding-top:calc(14px + env(safe-area-inset-top));}}

.cmdk{position:fixed;inset:0;z-index:125;display:none;}
.cmdk.open{display:block;}
.cmdk-back{position:absolute;inset:0;background:rgba(20,17,13,.50);backdrop-filter:blur(3px);}
.cmdk-box{position:absolute;top:10vh;left:50%;transform:translateX(-50%);width:min(720px,92vw);background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.38);overflow:hidden;}
.cmdk-search{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface-2);}
.cmdk-search input{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:16px;font-family:inherit;}
.cmdk-list{max-height:min(62vh,560px);overflow:auto;padding:8px;}
.cmdk-item{width:100%;display:flex;align-items:center;gap:10px;text-align:left;border:none;background:transparent;border-radius:12px;padding:10px 11px;cursor:pointer;color:var(--text);font-family:inherit;}
.cmdk-item:hover,.cmdk-item.active{background:var(--gold-bg);}
.cmdk-kind{font-size:10px;font-weight:800;color:var(--gold);border:1px solid var(--gold-border);border-radius:99px;padding:2px 7px;min-width:46px;text-align:center;background:var(--surface);}
.cmdk-main{font-size:14px;font-weight:700;line-height:1.35;}
.cmdk-sub{font-size:11.5px;color:var(--text-3);line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.cmdk-empty{padding:28px;text-align:center;color:var(--text-3);font-size:13px;}
.cmdk-foot{display:flex;gap:12px;flex-wrap:wrap;border-top:1px solid var(--border-light);padding:9px 14px;color:var(--text-4);font-size:11px;font-family:'JetBrains Mono',monospace;}
@media(max-width:640px){.cmdk-box{top:6vh;width:94vw}.cmdk-search input{font-size:15px}}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}}

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="logo serif">From Us</span>
      <span class="sub">Knowledge Hub</span>
      <span class="meta" id="buildMeta"></span>
      <button class="theme-btn" id="themeBtn" title="라이트/다크 전환" aria-label="테마 전환">🌙</button>
    </div>
    <div class="tabswrap" id="tabswrap">
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="home">개요</button>
      <button class="tab" data-tab="sectors">🧩 섹터·테마</button>
      <button class="tab" data-tab="stocks">📈 종목</button>
      <button class="tab" data-tab="strategy">🧭 전략</button>
      <button class="tab" data-tab="glossary">📚 용어</button>

    </div>
  </div>
  <div class="searchwrap">

</div>

  <div class="view" id="view-stocks"></div>
  <div class="view" id="view-strategy"></div>
  <div class="view" id="view-glossary"></div>

</div>

<div class="foot">

  <p>프롬어스 Knowledge Hub · 데일리/위클리 리포트 구조화 아카이브</p>
  <p style="margin-top:6px;font-size:11px;color:var(--text-4)">본 허브는 프롬어스 내부 리포트를 분석·집계하여 자동 생성되었으며, 투자 권유가 아닙니다.</p>
</div>

    </div>
  </div>

const FILE = {};
(D.reports||[]).forEach(r=>{ if(r.id&&r.file) FILE[r.id]=r.file; });

function miniChart(id, data, color){
  const el=document.getElementById(id); if(!el) return;
  if(!window.Chart || !data || data.length<2){
    const wrap=el.closest('.idx-chart');
    const last=(data&&data.length)?data[data.length-1].value.toLocaleString():null;
    if(wrap) wrap.innerHTML=`<div class="empty" style="padding:28px 8px;font-size:12px">데이터 부족<br><span style="font-size:10.5px;color:var(--text-4)">${last?('최근값 '+last):'리포트에 종가 미기재일 多'}</span></div>`;
    return;
  }
  const _cs=getComputedStyle(document.documentElement);
  const _grid=_cs.getPropertyValue('--grid').trim()||'#f0ece5';
  const _tx=_cs.getPropertyValue('--text-3').trim()||'#8a847a';
  const _ch=new Chart(el,{type:'line',
    data:{labels:data.map(p=>fmtDate(p.date)),datasets:[{data:data.map(p=>p.value),borderColor:color,backgroundColor:color+'22',tension:.3,fill:true,pointRadius:2,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{grid:{color:_grid},ticks:{font:{family:'JetBrains Mono',size:9},color:color}},
              x:{grid:{display:false},ticks:{font:{family:'JetBrains Mono',size:9},color:_tx,maxRotation:0,autoSkip:true,maxTicksLimit:5}}}}});
  (window.__charts=window.__charts||[]).push(_ch);
}

function drawStockList(){
  let list=(D.stocks||[]).slice();
  const q=stockQuery.trim().toLowerCase();
  if(q) list=list.filter(s=>s.name.toLowerCase().includes(q));
  if(stockOnlyWatch) list=list.filter(s=>isWatched('stock',s.name));

  if(stockSupplyOnly) list=list.filter(s=>(s.supply_count||0)>0);
  const meta=$('#stockResultMeta'); if(meta) meta.textContent=`${list.length.toLocaleString()} / ${(D.stocks||[]).length.toLocaleString()} 종목`;
  if(stockSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'ko'));

function scoreItem(it,tokens){
  const hay=(it.title+' '+it.snippet+' '+(it.tags||[]).join(' ')+' '+it.kind).toLowerCase();
  let sc=0;
  for(const t of tokens){ if(!hay.includes(t))return -1; sc += (it.title.toLowerCase().includes(t)?3:1); }

}
function runSearch(){
  const raw=$('#q').value.trim();

  let res=SEARCH.map(it=>({it,sc:scoreItem(it,tokens)})).filter(x=>x.sc>=0);
  // 종목명 직접 매칭 보너스
  res.sort((a,b)=> b.sc-a.sc || (b.it.date||'').localeCompare(a.it.date||''));
  const kinds=[...new Set(res.map(x=>x.it.kind))];

        <div class="sr-snip">${hl(it.snippet,tokens)}</div></button>`;

/* ── 모멘텀(언급 최근성) ── */
function dnum(d){ if(!d)return null;
  let m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(d);
  if(m)return Math.floor(Date.UTC(+m[1],+m[2]-1,+m[3])/864e5);
  m=/^(\d{4})-W(\d{2})$/.exec(d);
  if(m){const s=new Date(Date.UTC(+m[1],0,1+(+m[2]-1)*7));const dow=s.getUTCDay()||7; s.setUTCDate(s.getUTCDate()+1-dow); return Math.floor(s.getTime()/864e5);}
  return null;}
const TO_DAY=(()=>{const t=dnum((D.build&&D.build.to)||''); return t||Math.floor(Date.now()/864e5);})();
function momentumOf(mentions){
  const days=(mentions||[]).map(m=>dnum(m.date)).filter(x=>x!=null);
  if(!days.length)return null;
  const rec=days.filter(x=>x>=TO_DAY-13).length;
  const pri=days.filter(x=>x<TO_DAY-13&&x>=TO_DAY-27).length;
  if(rec>=3&&rec>pri*1.5) return {cls:'mo-hot',txt:'🔥 가열'};
  if(rec>=2&&rec>pri)     return {cls:'mo-warm',txt:'↗ 상승'};
  if(pri>=2&&rec<=pri*0.5) return {cls:'mo-cool',txt:'❄ 냉각'};
  if(rec>=1)              return {cls:'mo-flat',txt:'· 유지'};
  return null;
}
function momentumChip(o){const m=momentumOf(o&&o.mentions); return m?`<span class="mo-chip ${m.cls}">${m.txt}</span>`:'';}
const SECMAX=Math.max(1,...((D.sectors||[]).map(s=>s.count||0)));

/* ── 스파크라인(주별 언급 빈도) ── */
function weeklyCounts(mentions){
  const from=dnum((D.build&&D.build.from)||''),to=TO_DAY;
  if(from==null)return [];
  const weeks=Math.max(1,Math.ceil((to-from)/7));
  const arr=new Array(weeks+1).fill(0);
  (mentions||[]).forEach(m=>{const x=dnum(m.date); if(x==null)return; let wi=Math.floor((x-from)/7); if(wi<0)wi=0; if(wi>weeks)wi=weeks; arr[wi]++;});
  return arr;
}
function drawSpark(cv,counts){
  if(!cv||!counts||counts.length<2)return;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,pad=5;
  ctx.clearRect(0,0,W,H);
  const max=Math.max(1,...counts),n=counts.length;
  const gold=getComputedStyle(document.documentElement).getPropertyValue('--gold').trim()||'#b8860b';
  const x=i=>pad+i*(W-2*pad)/(n-1), y=v=>H-pad-(v/max)*(H-2*pad);
  ctx.beginPath();ctx.moveTo(x(0),H-pad);counts.forEach((v,i)=>ctx.lineTo(x(i),y(v)));ctx.lineTo(x(n-1),H-pad);ctx.closePath();
  ctx.fillStyle=gold+'22';ctx.fill();
  ctx.beginPath();counts.forEach((v,i)=>{const px=x(i),py=y(v);i?ctx.lineTo(px,py):ctx.moveTo(px,py);});
  ctx.strokeStyle=gold;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  ctx.beginPath();ctx.arc(x(n-1),y(counts[n-1]),3,0,7);ctx.fillStyle=gold;ctx.fill();
}

/* ═══════════ V3: 관계망 그래프 ═══════════ */
const SECTOR_BY_THEME={}; (D.sectors||[]).forEach(s=>SECTOR_BY_THEME[s.theme]=s);
const GPAL=['#dc2626','#2563eb','#16a34a','#7c3aed','#0891b2','#b8860b','#db2777','#ea580c','#0d9488','#4f46e5','#65a30d','#9333ea','#0284c7','#ca8a04','#e11d48','#059669','#a16207','#1d4ed8','#be123c','#15803d','#6d28d9','#0e7490','#c026d3','#0369a1','#b45309','#7e22ce','#047857','#9f1239'];
const GMAJOR_MIN=3;
let G=null, gAlpha=0, gRAF=null, gActive=false, gBuiltFilter=null;
let gView={k:1,tx:0,ty:0}, gHover=null, gDrag=null, gPan=null, gDirty=false;

function gClean(nm){return (''+nm).replace(/\s*[+\-]?\d[\d.,%]*\s*$/,'').trim()||nm;}
function buildGraph(filter){
  const sectors=(D.sectors||[]);
  const nodes=[], idx={}, links=[];
  sectors.forEach((s,i)=>{const id='S:'+s.theme;
    nodes.push({id,kind:'sector',name:s.theme,val:s.count||1,color:GPAL[i%GPAL.length],deg:0,ref:s,
      x:Math.cos(i/sectors.length*6.283)*120,y:Math.sin(i/sectors.length*6.283)*120,vx:0,vy:0});
    idx[id]=nodes.length-1;});
  sectors.forEach((s,i)=>{const col=GPAL[i%GPAL.length], sIdx=idx['S:'+s.theme];
    (s.stocks||[]).forEach(raw=>{const nm=gClean(raw); const st=STOCK_BY_NAME[nm]||STOCK_BY_NAME[raw];
      const cnt=(st&&st.count)||1;
      if(filter==='major' && cnt<GMAJOR_MIN && !(st&&(st.sectors||[]).length>=2)) return; // 주요: 언급 적고 단일섹터면 생략
      const id='K:'+nm;
      if(idx[id]==null){ nodes.push({id,kind:'stock',name:nm,val:cnt,color:col,deg:0,ref:st,
        x:(Math.random()-.5)*260,y:(Math.random()-.5)*260,vx:0,vy:0}); idx[id]=nodes.length-1; }
      links.push({s:sIdx,t:idx[id]}); nodes[sIdx].deg++; nodes[idx[id]].deg++;
    });
  });
  // 고립 섹터 제거 안 함(섹터는 항상 표시). 연결 0인 stock은 생기지 않음.
  return {nodes,links,idx};
}
function gRadius(n){return n.kind==='sector' ? 7+Math.sqrt(n.val)*2.4 : 3+Math.sqrt(n.val)*1.5;}
function gTick(){
  const N=G.nodes, L=G.links, n=N.length;
  const REP=1500, SPRING=0.025, SLEN=64, GRAV=0.018, DAMP=0.84;
  // 척력 (O(n^2), ~수백 노드 OK)
  for(let i=0;i<n;i++){const a=N[i];
    for(let j=i+1;j<n;j++){const b=N[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||0.01; if(d2>90000)continue;
      const f=REP/d2*gAlpha; const d=Math.sqrt(d2); const fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }}
  // 인력(스프링)
  for(const e of L){const a=N[e.s], b=N[e.t];
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
    const f=(d-SLEN)*SPRING*gAlpha; const fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
  }
  // 중심 중력 + 적분
  for(const p of N){
    p.vx-=p.x*GRAV*gAlpha; p.vy-=p.y*GRAV*gAlpha;
    if(p===gDrag){p.x=p.fx; p.y=p.fy; p.vx=0; p.vy=0; continue;}
    p.vx*=DAMP; p.vy*=DAMP;
    p.vx=Math.max(-12,Math.min(12,p.vx)); p.vy=Math.max(-12,Math.min(12,p.vy));
    p.x+=p.vx; p.y+=p.vy;
  }
  if(gAlpha>0.02) gAlpha*=0.992;
}
function gFit(){
  const cv=$('#graphCanvas'); if(!cv)return; const W=cv.clientWidth,H=cv.clientHeight;
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  for(const p of G.nodes){minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);}
  const gw=maxX-minX||1, gh=maxY-minY||1; const k=Math.min(W/(gw+120),H/(gh+120),1.6);
  gView.k=k; gView.tx=W/2-(minX+maxX)/2*k; gView.ty=H/2-(minY+maxY)/2*k;
}
function gNeighbors(node){const set=new Set();
  for(const e of G.links){ if(G.nodes[e.s]===node)set.add(G.nodes[e.t]); if(G.nodes[e.t]===node)set.add(G.nodes[e.s]); }
  return set;}
function gDraw(){
  const cv=$('#graphCanvas'); if(!cv)return; const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,dpr=window.devicePixelRatio||1;
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
  ctx.setTransform(gView.k*dpr,0,0,gView.k*dpr,gView.tx*dpr,gView.ty*dpr);
  const cs=getComputedStyle(document.documentElement);
  const lineC=cs.getPropertyValue('--border').trim()||'#e4dfd6';
  const txC=cs.getPropertyValue('--text-2').trim()||'#4a4540';
  const bg=cs.getPropertyValue('--surface').trim()||'#fff';
  const nb = gHover?gNeighbors(gHover):null;
  // links
  for(const e of G.links){const a=G.nodes[e.s], b=G.nodes[e.t];
    const hot = gHover && (a===gHover||b===gHover);
    ctx.strokeStyle = hot ? (a.kind==='sector'?a.color:b.color) : lineC;
    ctx.globalAlpha = gHover ? (hot?0.85:0.12) : 0.5;
    ctx.lineWidth = (hot?1.6:0.7)/gView.k;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  ctx.globalAlpha=1;
  // nodes
  for(const p of G.nodes){const r=gRadius(p);
    const dim = gHover && p!==gHover && !(nb&&nb.has(p));
    ctx.globalAlpha = dim?0.22:1;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,6.2832);
    ctx.fillStyle=p.color||'#9a8f7d'; ctx.fill();

    if(p===gHover){ctx.lineWidth=2.4/gView.k; ctx.strokeStyle=p.color; ctx.stroke();}
  }
  // labels: 섹터 항상, 종목은 hover/이웃/확대 시
  ctx.globalAlpha=1; ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillStyle=txC;
  for(const p of G.nodes){const r=gRadius(p);
    const showLbl = p.kind==='sector' || p===gHover || (nb&&nb.has(p)) || gView.k>1.25;
    if(!showLbl) continue;
    if(gHover && p!==gHover && !(nb&&nb.has(p))) continue;
    ctx.font=`${(p.kind==='sector'?12:10)}px 'Noto Sans KR',sans-serif`;
    ctx.fillStyle = p.kind==='sector'?txC:cs.getPropertyValue('--text-3').trim();
    ctx.fillText(p.name, p.x, p.y+r+2);
  }
  ctx.setTransform(1,0,0,1,0,0);
}
function gLoop(){ if(!gActive)return; if(gAlpha>0.02){gTick(); gDraw();} else if(gDirty){gDraw(); gDirty=false;} gRAF=requestAnimationFrame(gLoop); }
function gSizeCanvas(){const cv=$('#graphCanvas'); if(!cv)return; const dpr=window.devicePixelRatio||1;
  cv.width=cv.clientWidth*dpr; cv.height=cv.clientHeight*dpr; }
function gScreenToWorld(mx,my){return {x:(mx-gView.tx)/gView.k, y:(my-gView.ty)/gView.k};}
function gPick(mx,my){const w=gScreenToWorld(mx,my); let best=null,bd=1e9;
  for(const p of G.nodes){const r=gRadius(p)+4/gView.k; const dx=p.x-w.x,dy=p.y-w.y,d=dx*dx+dy*dy;

function gWireCanvas(){
  const cv=$('#graphCanvas'); if(!cv||cv.__wired)return; cv.__wired=true;
  const tip=$('#graphTip');
  cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top; gDirty=true;
    if(gDrag){const w=gScreenToWorld(mx,my); gDrag.fx=w.x; gDrag.fy=w.y; gAlpha=Math.max(gAlpha,0.3); return;}
    if(gPan){gView.tx+=e.clientX-gPan.x; gView.ty+=e.clientY-gPan.y; gPan={x:e.clientX,y:e.clientY}; return;}
    const hit=gPick(mx,my); gHover=hit;
    if(hit){cv.style.cursor='pointer'; const c=hit.ref&&hit.ref.count!=null?hit.ref.count:hit.val;
      tip.innerHTML=`<div class="gt-name">${esc(hit.name)}</div><div class="gt-meta">${hit.kind==='sector'?'섹터':'종목'} · ${c}회 · 연결 ${hit.deg}</div>`;
      tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px'; tip.classList.add('on');
    } else {cv.style.cursor='grab'; tip.classList.remove('on');}
  });
  cv.addEventListener('mousedown',e=>{const r=cv.getBoundingClientRect(); const hit=gPick(e.clientX-r.left,e.clientY-r.top);
    if(hit){gDrag=hit; const w=gScreenToWorld(e.clientX-r.left,e.clientY-r.top); gDrag.fx=w.x; gDrag.fy=w.y; gDrag.__moved=false;}
    else gPan={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',e=>{ if(gDrag){gDrag=null;} gPan=null; });
  cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect(); const hit=gPick(e.clientX-r.left,e.clientY-r.top); if(hit)gNavigate(hit);});
  cv.addEventListener('wheel',e=>{e.preventDefault(); const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top;
    const f=e.deltaY<0?1.12:0.89; const nk=Math.max(0.3,Math.min(3.2,gView.k*f));
    gView.tx=mx-(mx-gView.tx)*(nk/gView.k); gView.ty=my-(my-gView.ty)*(nk/gView.k); gView.k=nk; gDirty=true;},{passive:false});
  cv.addEventListener('mouseleave',()=>{tip.classList.remove('on'); gHover=null; gDirty=true;});
}

  return r.type==='weekly'?'주간 리포트':'데일리 리포트';}
function deriveQuery(el){
  const pick=(sel,c)=>{const n=c&&c.querySelector(sel);return n?n.textContent.trim():'';};
  let c;
  if(c=el.closest('.strow')) return pick('.strow-name',c);

  if(c=el.closest('.mention')) {const sp=c.querySelector('span:last-child'); if(sp)return sp.textContent.replace('원문↗','').trim();}
  return '';
}
function highlightInFrame(doc, q){
  rmHit=null; if(!doc||!doc.body||!q) return false;
  const norm=s=>(s||'').replace(/\s+/g,'').toLowerCase();
  const STOP=new Set(['ai','ess','etf','tp','per','pbr','roe','it','us','상승','하락','기대','전망','대표','대표님','관련','종목','오늘','이번','시장','코스피','코스닥','지수','발표','예정','분석','공유','뉴스','이슈']);
  const full=norm(q);
  let toks=q.split(/[\s,./·…"'"“”()\[\]\-—:;?!%+~|]+/).map(t=>t.trim())
            .filter(t=>t.length>=2 && !STOP.has(t.toLowerCase()) && !/^\d+$/.test(t));
  toks=[...new Set(toks)].map(norm).filter(Boolean);
  let nodes=[]; try{ const w=doc.createTreeWalker(doc.body,NodeFilter.SHOW_TEXT,null,false);
    let n; while(n=w.nextNode()){ const t=n.parentElement&&n.parentElement.tagName; if(t==='SCRIPT'||t==='STYLE')continue;
      const v=n.nodeValue; if(v&&v.trim().length>1) nodes.push(n);} }catch(e){return false;}
  const total=nodes.length||1;
  let best=null,bestScore=0;
  nodes.forEach((tn,i)=>{
    const t=norm(tn.nodeValue); if(t.length<2)return;
    let score=0;
    if(full.length>=4 && t.includes(full)) score+=80+Math.min(full.length,24);
    let hit=0; for(const tk of toks){ if(t.includes(tk)){ score+=(tk.length>=3?14:6); hit++; } }
    if(hit>=2) score+=20;                            // 여러 키워드 동시 등장 = 강한 신호
    const frac=i/total; if(frac<0.10) score*=0.5;    // 표지·머리말 구간 감점
    const len=tn.nodeValue.trim().length; if(len>=40 && len<=600) score+=4; // 본문 문단 가점
    if(score>bestScore){bestScore=score;best=tn;}
  });
  if(!best || bestScore<14) return false;            // 충분히 분명할 때만 점프(아니면 맨 위에서 열림)
  const el=best.parentElement; if(!el) return false;
  rmHit=el;
  const prevBg=el.style.backgroundColor;
  el.style.transition='background-color .35s'; el.style.backgroundColor='rgba(245,200,80,.55)'; el.style.borderRadius='4px';
  try{el.scrollIntoView({behavior:'smooth',block:'center'});}catch(_){el.scrollIntoView();}
  setTimeout(()=>{ el.style.backgroundColor=prevBg||''; }, 2800);
  return true;
}

  const last=latestMention(s)||{}; const note=last.annotation||last.label||last.theme||last.note||'';
  const themes=(s.themes||s.sectors||[]).slice(0,5).map(t=>`<span class="pill theme">${esc(t)}</span>`).join('');
  return `<div class="cmp-card"><div class="cmp-name"><button class="star ${isWatched('stock',s.name)?'on':''}" data-watch="stock:${esc(s.name)}" onclick="toggleWatchEl(this)">${isWatched('stock',s.name)?'★':'☆'}</button>${esc(s.name)}</div><canvas class="cmp-spark" width="520" height="88" data-cspark="${esc(s.name)}"></canvas><div class="cmp-kv"><div><b>${s.count||0}</b><span>전체 언급</span></div><div><b>${s.supply_count||0}</b><span>수급 포착</span></div><div><b>${s.theme_count||0}</b><span>테마 언급</span></div><div><b>${esc(fmtDate(last.date)||'-')}</b><span>최근 등장</span></div></div><div class="cmp-themes">${themes||'<span class="pulse-mini">테마 정보 없음</span>'}</div>${note?`<div class="cmp-note">${esc(note.slice(0,180))} ${last.id?srcLink(last.id,s.name):''}</div>`:''}</div>`;
}
function openCompareModal(){
  const list=CMP.map(n=>STOCK_BY_NAME[n]).filter(Boolean); const body=$('#cmpBody'); if(!body)return;
  body.innerHTML=list.length?`<div class="cmp-grid">${list.map(compareCard).join('')}</div>`:'<div class="empty">비교할 종목을 먼저 담아주세요.</div>';
  $('#cmpModal').classList.add('open');
  setTimeout(()=>{$$('[data-cspark]').forEach(cv=>{const st=STOCK_BY_NAME[cv.dataset.cspark]; if(st)drawSpark(cv,weeklyCounts(st.mentions));});},30);
}

document.addEventListener('click',e=>{const b=e.target.closest('[data-cmp]'); if(!b)return; e.stopPropagation(); toggleCompare(b.dataset.cmp);});

let CMD_ITEMS=[], cmdIndex=0;
function setupCommandPalette(){
  if($('#cmdk'))return;
  document.body.insertAdjacentHTML('beforeend',`<div class="cmdk" id="cmdk" role="dialog" aria-modal="true" aria-label="빠른 이동"><div class="cmdk-back" data-cmdclose></div><div class="cmdk-box"><div class="cmdk-search"><span>⌘K</span><input id="cmdInput" type="text" placeholder="빠른 이동: 종목·섹터·용어·리포트 검색"></div><div class="cmdk-list" id="cmdList"></div><div class="cmdk-foot"><span>↑↓ 이동</span><span>Enter 실행</span><span>Esc 닫기</span><span>/ 전역 검색</span></div></div></div>`);
  CMD_ITEMS=buildCommandItems();
  $('#cmdInput').addEventListener('input',()=>{cmdIndex=0;drawCommandList();});
  $('#cmdInput').addEventListener('keydown',e=>{const rows=$$('.cmdk-item'); if(e.key==='ArrowDown'){e.preventDefault();cmdIndex=Math.min(rows.length-1,cmdIndex+1);drawCommandList();} if(e.key==='ArrowUp'){e.preventDefault();cmdIndex=Math.max(0,cmdIndex-1);drawCommandList();} if(e.key==='Enter'){e.preventDefault();const row=$$('.cmdk-item')[cmdIndex]; if(row)runCommand(row.dataset.idx);}});
  $$('[data-cmdclose]').forEach(x=>x.addEventListener('click',closeCommand));
  document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCommand();} if(e.key==='Escape'&&$('#cmdk').classList.contains('open'))closeCommand();});
}
function buildCommandItems(){
  const items=[
    {kind:'이동',title:'개요',sub:'홈 대시보드',go:()=>showTab('home')},
    {kind:'이동',title:'섹터·테마',sub:'테마 클러스터',go:()=>showTab('sectors')},
    {kind:'이동',title:'종목 유니버스',sub:'필터와 비교',go:()=>showTab('stocks')},
    {kind:'이동',title:'전략',sub:'스탠스와 원칙',go:()=>showTab('strategy')},
    {kind:'이동',title:'관계망',sub:'섹터·종목 그래프',go:()=>showTab('graph')}
  ];
  (D.stocks||[]).slice(0,80).forEach(s=>items.push({kind:'종목',title:s.name,sub:`${s.count||0}회 · 수급 ${s.supply_count||0} · ${(s.themes||[]).slice(0,2).join(', ')}`,go:()=>{showTab('stocks');stockQuery=s.name;stockSort='count';renderStocks();}}));
  (D.sectors||[]).slice(0,50).forEach(s=>items.push({kind:'섹터',title:s.theme,sub:`${s.count||0}회 · ${(s.stocks||[]).slice(0,4).join(', ')}`,go:()=>{showTab('sectors');setTimeout(()=>{const card=$$('#view-sectors .scard').find(c=>c.querySelector('.scard-name')?.textContent===s.theme); if(card){card.querySelector('.scard-detail').classList.add('open');card.scrollIntoView({behavior:'smooth',block:'center'});}},80);}}));
  (D.glossary||[]).slice(0,80).forEach(g=>items.push({kind:'용어',title:g.term,sub:(g.body||'').slice(0,90),go:()=>{showTab('glossary');glossQuery=g.term;renderGlossary();}}));
  (D.reports||[]).slice().reverse().slice(0,40).forEach(r=>items.push({kind:r.type==='weekly'?'주간':'데일리',title:r.headline||r.file,sub:`${fmtDate(r.date)} · ${r.subhead||''}`,go:()=>openReport(r.id,r.headline||'')}));
  return items;
}
function openCommand(){const m=$('#cmdk');m.classList.add('open');$('#cmdInput').value='';cmdIndex=0;drawCommandList();setTimeout(()=>$('#cmdInput').focus(),20);}
function closeCommand(){$('#cmdk').classList.remove('open');}
function drawCommandList(){
  const q=($('#cmdInput')?.value||'').toLowerCase().trim();
  let res=CMD_ITEMS.map((it,i)=>({it,i,hay:(it.kind+' '+it.title+' '+it.sub).toLowerCase()})).filter(x=>!q||q.split(/\s+/).every(t=>x.hay.includes(t))).slice(0,40);
  if(cmdIndex>=res.length)cmdIndex=Math.max(0,res.length-1);
  $('#cmdList').innerHTML=res.length?res.map((x,n)=>`<button class="cmdk-item ${n===cmdIndex?'active':''}" data-idx="${x.i}"><span class="cmdk-kind">${esc(x.it.kind)}</span><span><div class="cmdk-main">${esc(x.it.title)}</div><div class="cmdk-sub">${esc(x.it.sub||'')}</div></span></button>`).join(''):'<div class="cmdk-empty">결과가 없습니다. 전역 검색(/)도 함께 활용해 보세요.</div>';
  $$('.cmdk-item').forEach(b=>b.addEventListener('click',()=>runCommand(b.dataset.idx)));
}
function runCommand(idx){const it=CMD_ITEMS[+idx]; if(!it)return; closeCommand(); setTimeout(()=>it.go(),20);}
function bootV4Enhancements(){setupCompareUI();setupCommandPalette();injectMarketPulse();refreshCompareUI();}

/* ───────── INIT ───────── */
renderHome();renderSectors();renderStocks();renderStrategy();renderGlossary();renderGraph();
bootV4Enhancements();
tabFromHash();
</script>
</body>
