# .github/workflows/rebuild_hub.yml
# 리포트 HTML이 커밋되면 지식허브(knowledge_base.json)·아카이브(index.html)를 자동 재빌드.
# 목적: chat_kb만 갱신되고 리포트 온톨로지가 정체되는 비대칭 해소 (2026-07-15 점검에서
#       knowledge_base 6/12 · index 5/29 · chat_kb 7/14로 확인됨).
#
# ⚠️ 적용 전 확인:
#   - build_hub.py / build_index.py가 인자 없이 레포 루트에서 실행되는지 (아니면 run 스텝 수정)
#   - build_hub.py가 yfinance 등 외부 패키지를 쓰면 install 스텝에 추가
#   - ai_digest.py는 모델 API를 호출하므로 여기 포함하지 않음 (필요 시 별도 수동 실행)

name: Rebuild knowledge hub

on:
  push:
    branches: [main]
    paths:
      - "reports/**"
  workflow_dispatch: {}   # 수동 실행 버튼 (밀린 6~7월분 최초 1회 재빌드용)

permissions:
  contents: write

concurrency:
  group: rebuild-hub
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt 2>/dev/null || true
          pip install yfinance beautifulsoup4 lxml || true   # build_hub 의존성에 맞게 조정

      - name: Rebuild hub ontology + archive index
        run: |
          python build_hub.py
          python build_index.py

      - name: Commit & push if changed
        run: |
          git config user.name "fromus-hub-bot"
          git config user.email "actions@users.noreply.github.com"
          git add knowledge_base.json index.html hub.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: rebuild hub/index for new reports [skip ci]"
            git push
          fi
