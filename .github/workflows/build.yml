# ───────────────────────────────────────────────────────────────
#  Build Index + Knowledge Hub  (기존 build.yml 대체본)
#  기존 동작(아카이브 index.html 생성)은 그대로 두고,
#  지식 허브(hub.html + knowledge_base.json) 생성 단계만 추가했습니다.
#  → 워크플로 1개가 둘을 한 번에 커밋 = 동시 푸시 경합/무한루프 없음.
#  설치: 기존 .github/workflows/build.yml 을 이 내용으로 교체.
# ───────────────────────────────────────────────────────────────
name: Build Index

on:
  push:
    paths:
      - 'reports/**'          # 새 리포트가 올라오면
      - 'build_index.py'      # 아카이브 생성기 변경 시
      - 'build_hub.py'        # 허브 생성기 변경 시
      - 'hub_template.html'   # 허브 UI 변경 시
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (knowledge hub)
        run: pip install beautifulsoup4 lxml

      - name: Run build_index.py (아카이브 목록 — 기존 그대로)
        run: python build_index.py

      - name: Run build_hub.py (지식 허브)
        run: python build_hub.py --src . --out hub.html --json knowledge_base.json

      - name: Commit and push (index + hub 한 번에)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: rebuild index + knowledge hub'
          file_pattern: 'index.html hub.html knowledge_base.json'
