# ───────────────────────────────────────────────────────────────
#  Build Index + Knowledge Hub + AI Digest
#  1) build_index.py  → 아카이브 index.html
#  2) build_hub.py    → knowledge_base.json (1차)
#  3) ai_digest.py    → AI 위클리 다이제스트 (ANTHROPIC_API_KEY 시크릿 있을 때만)
#  4) build_hub.py    → hub.html (2차 — 다이제스트 반영)
#  AI 시크릿 설정: repo Settings → Secrets and variables → Actions
#                  → New repository secret → 이름 ANTHROPIC_API_KEY
# ───────────────────────────────────────────────────────────────
name: Build Index

on:
  push:
    paths:
      - 'reports/**'
      - 'build_index.py'
      - 'build_hub.py'
      - 'ai_digest.py'
      - 'hub_template.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (knowledge hub)
        run: pip install beautifulsoup4 lxml yfinance

      - name: Run build_index.py (아카이브 목록)
        run: python build_index.py

      - name: Run build_hub.py (1차 — knowledge_base.json 생성)
        run: python build_hub.py --src . --out hub.html --json knowledge_base.json

      - name: AI weekly digest (선택 — 시크릿 없으면 자동 생략)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ai_digest.py || echo "AI 다이제스트 생략(실패 무시)"

      - name: Run build_hub.py (2차 — 다이제스트 반영)
        run: python build_hub.py --src . --out hub.html --json knowledge_base.json

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: rebuild index + knowledge hub'
          file_pattern: 'index.html hub.html knowledge_base.json ai_digest.json'
